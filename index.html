<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f9f8f5;--border:#e2e0da;--text:#1a1917;--muted:#6b6860;--accent:#1a3a5c;--accent2:#c8a96e;--green:#2d6a4f;--red:#8b1a1a;--font:"IBM Plex Sans",sans-serif;--mono:"IBM Plex Mono",monospace;--r:6px;--r2:10px}
[data-theme="dark"]{--bg:#0f1117;--surface:#1a1d27;--surface2:#222534;--border:#2e3247;--text:#e8eaf0;--muted:#8b8fa8;--accent:#4a90d9;--accent2:#c8a96e;--green:#4ade80;--red:#f87171}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;min-height:100vh}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);color:#fff;gap:1rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--accent);padding:2rem}
.login-card{background:var(--surface);border-radius:var(--r2);padding:2.5rem;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-logo{text-align:center;margin-bottom:2rem}
.seal{width:72px;height:72px;background:var(--accent);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:28px;margin-bottom:1rem}
.login-logo h1{font-size:17px;font-weight:600;color:var(--accent);line-height:1.4}
.login-logo p{font-size:12px;color:var(--muted);margin-top:4px}
.field{margin-bottom:1rem}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.6px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent)}
.field textarea{resize:vertical;min-height:80px}
.field input:disabled{background:var(--surface2);color:var(--muted)}
.btn{padding:9px 18px;border-radius:var(--r);border:none;font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#122d4a}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{background:var(--surface2)}
.btn-danger{background:#fee2e2;color:var(--red);border:1px solid #fca5a5}
.btn-success{background:#dcfce7;color:var(--green);border:1px solid #86efac}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{color:var(--red);font-size:12px;padding:8px 10px;background:#fee2e2;border-radius:var(--r);margin-top:6px}
.topbar{background:var(--accent);color:#fff;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:14px;font-weight:600;flex:1}
.topbar-brand span{color:var(--accent2);font-family:var(--mono);font-size:11px;display:block;font-weight:400}
.topbar-user{font-size:12px;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:8px}
.user-badge{width:30px;height:30px;background:var(--accent2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--accent);flex-shrink:0}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0}
.sync-dot.syncing{background:#f59e0b;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;font-size:12px;border-radius:var(--r);cursor:pointer;font-family:var(--font)}
.layout{display:flex;flex:1;min-height:calc(100vh - 52px)}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:1rem 0;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto}
.nav-item{padding:9px 1.25rem;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;border-left:3px solid transparent;transition:all .1s;user-select:none}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:#e8f0f8;color:var(--accent);border-left-color:var(--accent);font-weight:500}
.nav-item i{font-size:17px}
.nav-section{padding:12px 1.25rem 4px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.main{flex:1;overflow-y:auto;padding:1.75rem;max-width:1300px}
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:600;color:var(--accent)}
.page-subtitle{font-size:12px;color:var(--muted);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem;margin-bottom:1rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:1.25rem}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px;font-weight:600}
.stat-value{font-size:30px;font-weight:600;color:var(--accent);font-family:var(--mono)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}
.status-badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.sb1{background:#e0f2fe;color:#0369a1}.sb2{background:#fef9c3;color:#854d0e}
.sb3{background:#fef3c7;color:#92400e}.sb4{background:#fce7f3;color:#9d174d}
.sb5{background:#f3e8ff;color:#6b21a8}.sb6{background:#dbeafe;color:#1e40af}
.sb7{background:#dcfce7;color:#166534}.sb8{background:#1a3a5c;color:#fff}
.pipeline{display:flex;overflow-x:auto;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;margin-bottom:1.5rem}
.pipe-step{flex:1;min-width:90px;padding:.75rem .5rem;text-align:center;font-size:11px;font-weight:600;cursor:pointer;border-right:1px solid var(--border)}
.pipe-step:last-child{border-right:none}
.pipe-step .pipe-count{font-size:22px;font-weight:700;font-family:var(--mono);display:block;margin-bottom:2px}
.pipe-step.active{outline:3px solid var(--accent);outline-offset:-3px;z-index:1}
.table-wrap{overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 280px)}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);background:var(--surface2);white-space:nowrap;position:sticky;top:0;z-index:2;background:var(--surface)}
td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.proto-num{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);background:#e8f0f8;padding:3px 8px;border-radius:4px;white-space:nowrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;display:inline-block}
.badge-compra{background:#dbeafe;color:#1e40af}.badge-rural{background:#dcfce7;color:#166534}
.badge-divorcio{background:#fce7f3;color:#9d174d}.badge-inventario{background:#fef3c7;color:#92400e}
.badge-doacao{background:#f3e8ff;color:#6b21a8}.badge-testamento{background:#ffedd5;color:#9a3412}.badge-ata{background:#f0fdf4;color:#166534}
.badge-pink{background:#fdf2f8;color:#9d174d}
.badge-red{background:#fef2f2;color:#991b1b}
.badge-amber{background:#fffbeb;color:#b45309}
.badge-sky{background:#e0f2fe;color:#0369a1}
.badge-slate{background:#f8fafc;color:#475569}
.badge-teal{background:#f0fdfa;color:#0f766e}
.badge-sup{background:#fef3c7;color:#92400e}.badge-esc{background:#dbeafe;color:#1e40af}.badge-aux{background:#f3e8ff;color:#6b21a8}
.alert{padding:.75rem 1rem;border-radius:var(--r);font-size:12px;display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.75rem}
.alert-warning{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.alert-danger{background:#fee2e2;border:1px solid #fca5a5;color:var(--red)}
.alert-info{background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1}
.notif-badge{background:var(--red);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;margin-left:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:1.5rem;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:860px;box-shadow:0 25px 80px rgba(0,0,0,.35);margin:auto}

function gun(id){for(var i=0;i<A.users.length;i++)if(A.users[i].id===id)return A.users[i].name;return id||"?";}
function ini(n){if(!n)return"??";var p=n.split(" "),r="";for(var i=0;i<p.length&&r.length<2;i++)if(p[i].length>0)r+=p[i][0];return r.toUpperCase()||"??";}

function ex(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function pnAll(p){
  // Get all partes names for search
  var all="";
  var partes=p.partes||{};
  var keys=Object.keys(partes);
  for(var ki=0;ki<keys.length;ki++){
    var g=partes[keys[ki]]||[];
    for(var i=0;i<g.length;i++)if(g[i].n)all+=g[i].n+" ";
  }
  if(!all.trim()){
    var tr=p.transmitentes||[];var ad=p.adquirentes||[];
    for(var i=0;i<tr.length;i++)if(tr[i].n)all+=tr[i].n+" ";
    for(var i=0;i<ad.length;i++)if(ad[i].n)all+=ad[i].n+" ";
  }
  return all.toLowerCase();
}
function gcp(p){
  var cl=A.checklists[p.natureza];
  var t=0,d=0;
  var hidden=p.hiddenItems||{};
  if(cl){for(var si=0;si<cl.sections.length;si++)for(var ii=0;ii<cl.sections[si].items.length;ii++){
    if(hidden[si+"_"+ii])continue; // skip hidden
    t++;if(p.checklist&&p.checklist[si]&&p.checklist[si][ii])d++;
  }}
  var ex2=p.extraItems||[];
  for(var ei=0;ei<ex2.length;ei++){t++;if(p.extraChecked&&p.extraChecked[ei])d++;}
  return{done:d,total:t,pct:t?Math.round(d/t*100):0};
}
function icl(nat){var cl=A.checklists[nat];if(!cl)return{};var o={};for(var si=0;si<cl.sections.length;si++)o[si]={};return o;}
function gproto(){var ns=[];for(var i=0;i<A.processes.length;i++){var n=parseInt(A.processes[i].protocol.replace(/\D/g,""));if(!isNaN(n))ns.push(n);}var nx=ns.length?Math.max.apply(null,ns)+1:1;var s=String(nx);while(s.length<8)s="0"+s;return s;}
function days(p){var d=(p.statusHistory&&p.statusHistory.length)?p.statusHistory[p.statusHistory.length-1].at:p.createdAt;return Math.floor((Date.now()-new Date(d).getTime())/86400000);}
function cad(p){
  var cur=p.status||"cadastrado";
  var cs=gs(cur).step;
  var nx=null;
  for(var i=0;i<STS.length;i++)if(STS[i].step===cs+1){nx=STS[i];break;}
  if(!nx)return false;
  // Auxiliar cannot advance from conferindo or registro
  if(cur==="conferindo"||cur==="registro"){
    if(A.user.role!=="supervisor"&&A.user.role!=="escrevente")return false;
  }
  // Only escrevente/supervisor can move TO conferindo
  if(nx.key==="conferindo"){
    var ok=false;for(var j=0;j<CONF_ROLES.length;j++)if(CONF_ROLES[j]===A.user.role){ok=true;break;}
    if(!ok)return false;
  }
  return true;
}
function nxst(p){var cs=gs(p.status||"cadastrado").step;for(var i=0;i<STS.length;i++)if(STS[i].step===cs+1)return STS[i];return null;}
function prvst(p){var cs=gs(p.status||"cadastrado").step;if(cs<=1)return null;for(var i=0;i<STS.length;i++)if(STS[i].step===cs-1)return STS[i];return null;}
function canBack(p){
  var cur=p.status||"cadastrado";
  var prv=prvst(p);
  if(!prv)return false;
  // Auxiliar cannot move AT ALL when process is in conferindo or registro
  if(cur==="conferindo"||cur==="registro"){
    return A.user.role==="supervisor"||A.user.role==="escrevente";
  }
  // Auxiliar cannot go back TO conferindo
  if(prv.key==="conferindo"){
    return A.user.role==="supervisor"||A.user.role==="escrevente";
  }
  return true;
}

function notifs(){
  var r=[],today=new Date();today.setHours(0,0,0,0);
  for(var i=0;i<A.processes.length;i++){
    var p=A.processes[i];if(p.status==="registro")continue;
    var d=days(p);
    if(d>5)r.push({tp:"danger",proto:p.protocol,id:p.id,msg:"Parado ha "+d+" dias na etapa "+gs(p.status||"cadastrado").label});
    else if(d>2)r.push({tp:"warning",proto:p.protocol,id:p.id,msg:d+" dias na etapa "+gs(p.status||"cadastrado").label});

  }
  return r;
}

function startApp(){
  try{
    firebase.initializeApp(FB);
    db=firebase.firestore();
    auth=firebase.auth();
    auth.onAuthStateChanged(function(fbUser){
      if(fbUser){
        db.collection("users").get().then(function(s){
          A.users=s.docs.map(function(d){return d.data();});
          for(var i=0;i<A.users.length;i++){
            if(A.users[i].authUid===fbUser.uid){A.user=A.users[i];loadCL();return;}
          }
          for(var j=0;j<A.users.length;j++){
            if(A.users[j].email===fbUser.email){A.user=A.users[j];db.collection("users").doc(A.users[j].id).update({authUid:fbUser.uid});loadCL();return;}
          }
          auth.signOut();
        });
      } else {
        A.user=null;if(A.unsub){A.unsub();A.unsub=null;}
        A.processes=[];A.users=[];render();
      }
    });
  }catch(e){
    var errMsg=e.message||String(e);
    var appEl=document.getElementById('app');
    if(appEl)appEl.innerHTML='<div class="loading-screen">'
      +'<div style="color:#f87171;text-align:center;padding:2rem">'
      +'<div style="font-size:18px;margin-bottom:8px">&#9888; Erro ao iniciar</div>'
      +'<div style="font-size:13px;background:rgba(0,0,0,.1);padding:8px;border-radius:6px;font-family:monospace;margin-bottom:12px">'+errMsg+'</div>'
      +'<a href="" style="font-size:13px;color:#60a5fa">Tentar novamente</a>'
      +'</div></div>';

  }

function loadCL(){
  db.collection("config").doc("checklists").get().then(function(s){
    if(s.exists){
      // ALWAYS use firebase data - never overwrite with defaults
      var fbData=s.data();
      if(fbData.data&&Object.keys(fbData.data).length>0){
        A.checklists=fbData.data;
        console.log("Checklists carregados do Firebase:",Object.keys(A.checklists).length,"naturezas");
      } else {
        // Firebase doc exists but data is empty - save defaults
        console.log("Firebase sem checklists - salvando padroes");
        db.collection("config").doc("checklists").update({data:A.checklists});
      }
      if(fbData.nats&&fbData.nats.length>0){
        A.nats=fbData.nats;
        console.log("Nats carregados do Firebase:",A.nats.length);
      }
      // Load custom PLABELS from Firebase
      if(fbData.plabels&&Object.keys(fbData.plabels).length>0){
        var pl=fbData.plabels;
        Object.keys(pl).forEach(function(k){PLABELS[k]=pl[k];});
        console.log("PLABELS carregados:",Object.keys(pl).length,"customizadas");
      } else {
        // Nats missing - add without touching checklists
        console.log("Nats ausentes - adicionando ao Firebase");
        db.collection("config").doc("checklists").update({nats:A.nats});
      }
    } else {
      // Document doesn't exist yet - create with defaults
      console.log("Documento nao existe - criando com padroes");
      db.collection("config").doc("checklists").set({data:A.checklists,nats:A.nats});
    }
    subP();
  }).catch(function(e){
    console.error("Erro ao carregar checklists:",e);
    subP();
  });
}

function subP(){
  if(A.unsub)A.unsub();
  A.unsub=db.collection("processes")
    .where("archived","!=",true)
    .orderBy("archived").orderBy("createdAt","desc")
    .onSnapshot(function(s){
      A.processes=s.docs.map(function(d){return d.data();});
      // Don't re-render if modal is open (user filling form)
      var modalOpen=document.querySelector(".modal-overlay");
      if(!modalOpen)render();

        for(var si3=0;si3<A.processes.length;si3++){

            if(A.processes[si3].id===A.processes[sj].id){break;}

    },function(e){

      db.collection("processes").orderBy("createdAt","desc").onSnapshot(function(s){
        A.processes=s.docs.map(function(d){return d.data();}).filter(function(p){return !p.archived;});

function rDash(){
  var tot=A.processes.length,hoje=new Date().toDateString(),hc=0,pst={};
  for(var i=0;i<A.processes.length;i++)if(new Date(A.processes[i].createdAt).toDateString()===hoje)hc++;
  for(var s=0;s<STS.length;s++){var c=0;for(var p=0;p<A.processes.length;p++)if((A.processes[p].status||"cadastrado")===STS[s].key)c++;pst[STS[s].key]=c;}
  var nt=notifs(),stale=0;for(var ni2=0;ni2<nt.length;ni2++)if(nt[ni2].tp==="danger")stale++;
  var todStr=new Date().toISOString().split("T")[0],ah=[];
  for(var ap=0;ap<A.processes.length;ap++)if(A.processes[ap].dataAssinatura===todStr)ah.push(A.processes[ap]);
  var rec=A.processes.slice(0,6);
  var h='<div class="page-header"><div><div class="page-title">Dashboard</div>'
  +'<div class="page-subtitle">'+new Date().toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+'</div></div></div>';
  if(stale>0)h+='<div class="alert alert-danger"><i class="ti ti-alert-triangle"></i> <strong>'+stale+' alerta(s) critico(s)!</strong> Veja Alertas.</div>';
  if(ah.length>0)h+='<div class="alert alert-info"><i class="ti ti-signature"></i> <strong>'+ah.length+' assinatura(s) hoje</strong></div>';
  h+='<div class="stats-grid">'
  +'<div class="stat-card"><div class="stat-label">Total protocolos</div><div class="stat-value">'+tot+'</div></div>'
  +'<div class="stat-card"><div class="stat-label">Abertos hoje</div><div class="stat-value">'+hc+'</div></div>'
  +'<div class="stat-card"><div class="stat-label">Aguard. Assinatura</div><div class="stat-value">'+(pst["aguard_assinatura"]||0)+'</div></div>'
  +'<div class="stat-card"><div class="stat-label">Em Registro</div><div class="stat-value">'+(pst["registro"]||0)+'</div></div>'
  +'</div>'

  for(var st=0;st<STS.length;st++)h+='<div class="pipe-step '+STS[st].cls+(A.pipe===STS[st].key?" active":"")+ '" data-pipe="'+STS[st].key+'"><span class="pipe-count">'+(pst[STS[st].key]||0)+'</span>'+STS[st].label+'</div>';
  h+='</div></div>';

  else for(var r=0;r<rec.length;r++){var rp=rec[r],rs=gs(rp.status||"cadastrado"),rd=days(rp);h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><span class="proto-num" style="display:inline-block;margin-bottom:3px">'+ex(rp.protocol)+'</span><div class="text-xs text-muted">'+ex(pnFromP(rp))+'</div></div><div><span class="status-badge '+rs.cls+'">'+rs.label+'</span>'+(rd>3?'<br><span class="stale-badge">&#9888; '+rd+'d</span>':"")+'</div></div>';}

  h+='</div></div>';return h;
}

function rProc(){
  // Default period: last 6 months if no date filter set
  var defaultFrom="";
  if(!A.fdf&&!A.fdt&&!A.pipe&&!A.fnat&&!A.fst&&!A.search){
    var d6=new Date();d6.setMonth(d6.getMonth()-6);
    defaultFrom=d6.toISOString().split("T")[0];
  }
  var filt=[];
  for(var i=0;i<A.processes.length;i++){
    var p=A.processes[i],s=A.search.toLowerCase();
    var tr=pn(p.transmitentes).toLowerCase(),ad=pn(p.adquirentes).toLowerCase(),cpfs="";
    if(p.transmitentes)for(var t=0;t<p.transmitentes.length;t++)cpfs+=(p.transmitentes[t].c||"")+" ";
    if(p.adquirentes)for(var a=0;a<p.adquirentes.length;a++)cpfs+=(p.adquirentes[a].c||"")+" ";
    var sf=(p.protocol+" "+pnAll(p)+" "+(p.matriculas||"")).toLowerCase();
    if(s&&sf.indexOf(s)<0)continue;
    if(A.fnat&&p.natureza!==A.fnat)continue;
    if(A.fst&&(p.status||"cadastrado")!==A.fst)continue;
    if(A.pipe&&(p.status||"cadastrado")!==A.pipe)continue;
    if(A.fdf&&p[A.fdf2]&&p[A.fdf2]<A.fdf)continue;
    if(A.fdt&&p[A.fdf2]&&p[A.fdf2]>A.fdt)continue;
    if(defaultFrom&&p.dataAbertura&&p.dataAbertura<defaultFrom)continue;
    filt.push(p);
  }
  // Sort most recent first
  filt.sort(function(a,b){return (b.createdAt||b.dataAbertura||'')>(a.createdAt||a.dataAbertura||'')?1:-1;});

function rRel(){
  // === Filters state ===
  var period=A.relPeriod||"mes";
  var relStatus=A.relStatus||"";
  var relYear=A.relYear||(new Date().getFullYear());
  var relMonth=A.relMonth!==undefined?A.relMonth:new Date().getMonth();

  // === Filter processes by date ===
  var procs=A.processes.filter(function(p){
    if(relStatus&&(p.status||"cadastrado")!==relStatus)return false;
    return true;
  });

  // === Group by period ===
  function getKey(p){
    var d=p.dataAbertura||p.createdAt.split("T")[0];
    if(!d)return null;
    var dt=new Date(d+"T12:00:00");
    if(period==="dia"){return d;}
    if(period==="semana"){
      var day=dt.getDay(),diff=dt.getDate()-day+(day===0?-6:1);
      var mon=new Date(dt);mon.setDate(diff);
      return mon.toISOString().split("T")[0];
    }
    if(period==="mes"){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0");}
    if(period==="ano"){return String(dt.getFullYear());}
    return null;
  }

  // Build grouped data
  var groups={};
  for(var i=0;i<procs.length;i++){
    var k=getKey(procs[i]);
    if(!k)continue;
    groups[k]=(groups[k]||0)+1;
  }
  var keys=Object.keys(groups).sort();

  // Limit to last N periods for readability
  var maxBars=period==="dia"?30:period==="semana"?26:period==="mes"?24:10;
  if(keys.length>maxBars)keys=keys.slice(keys.length-maxBars);

  var maxVal=0;for(var ki=0;ki<keys.length;ki++)if(groups[keys[ki]]>maxVal)maxVal=groups[keys[ki]];

  // Format label
  function fLabel(k){
    if(period==="dia"){var p2=k.split("-");return p2[2]+"/"+p2[1];}
    if(period==="semana"){var p2=k.split("-");return "Sem "+p2[2].substring(0,2)+"/"+p2[1];}
    if(period==="mes"){var p2=k.split("-");var mns=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];return mns[parseInt(p2[1])-1]+"/"+p2[0].slice(2);}
    return k;
  }

  // Trend: compare last 2 halves
  var trend="";var trendColor="var(--muted)";var trendIcon="ti-minus";
  if(keys.length>=4){
    var half=Math.floor(keys.length/2);
    var s1=0,s2=0;
    for(var ti=0;ti<half;ti++)s1+=groups[keys[ti]]||0;
    for(var ti2=half;ti2<keys.length;ti2++)s2+=groups[keys[ti2]]||0;
    if(s2>s1){trend="Tendencia de alta &#8593;";trendColor="var(--green)";trendIcon="ti-trending-up";}
    else if(s2<s1){trend="Tendencia de queda &#8595;";trendColor="var(--red)";trendIcon="ti-trending-down";}
    else{trend="Estavel";trendColor="var(--muted)";trendIcon="ti-minus";}
  }

  // Build chart HTML (pure CSS bar chart)
  var chartH='<div style="display:flex;align-items:flex-end;gap:4px;height:180px;padding:0 4px;border-bottom:2px solid var(--border);border-left:2px solid var(--border);margin:1rem 0 0 24px;overflow-x:auto">';
  for(var ci=0;ci<keys.length;ci++){
    var val=groups[keys[ci]]||0;
    var pct=maxVal?Math.max(val/maxVal*100,2):2;
    var isLast=ci===keys.length-1;
    // Color: green if higher than prev, red if lower, blue otherwise
    var barColor="var(--accent)";
    if(ci>0){
      var prev=groups[keys[ci-1]]||0;
      if(val>prev)barColor="var(--green)";
      else if(val<prev)barColor="var(--red)";
    }
    chartH+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:'+(period==="dia"?"28":"36")+'px">'
      +'<span style="font-size:10px;font-weight:600;color:'+barColor+'">'+val+'</span>'
      +'<div style="width:100%;background:'+barColor+';border-radius:3px 3px 0 0;height:'+pct+'%;transition:height .3s;cursor:default" title="'+fLabel(keys[ci])+': '+val+' protocolo(s)"></div>'
      +'<span style="font-size:9px;color:var(--muted);white-space:nowrap;transform:rotate(-35deg);transform-origin:top center;margin-top:4px;display:block">'+fLabel(keys[ci])+'</span>'
      +'</div>';
  }
  chartH+='</div>';
  if(keys.length===0)chartH='<div class="empty-state" style="padding:2rem"><i class="ti ti-chart-bar-off"></i>Nenhum dado para o periodo selecionado.</div>';

  // Total and average

  var avg=keys.length?Math.round(total/keys.length):0;

  // Status distribution
  var pst={};for(var s=0;s<STS.length;s++){var cnt=0;for(var p=0;p<procs.length;p++)if((procs[p].status||"cadastrado")===STS[s].key)cnt++;pst[STS[s].key]=cnt;}

  var h='<div class="page-header"><div><div class="page-title">Relatorios</div></div></div>'
  // === Chart card ===
  +'<div class="card">'
  +'<div class="card-header">'
  +'<div><div class="card-title"><i class="ti ti-chart-bar" style="color:var(--accent)"></i> Evolucao de entradas de protocolos</div>'

  +'</div>'

  +'<div class="flex gap-sm">'
  +'<button class="btn btn-sm '+(period==="dia"?"btn-primary":"btn-secondary")+'" id="rPeriodDia">Dia</button>'
  +'<button class="btn btn-sm '+(period==="semana"?"btn-primary":"btn-secondary")+'" id="rPeriodSem">Semana</button>'
  +'<button class="btn btn-sm '+(period==="mes"?"btn-primary":"btn-secondary")+'" id="rPeriodMes">Mes</button>'
  +'<button class="btn btn-sm '+(period==="ano"?"btn-primary":"btn-secondary")+'" id="rPeriodAno">Ano</button>'

  +'<select class="filter-select" id="rStFilt" style="font-size:12px;padding:5px 10px">'+stOpts+'</select>'

  // Stats summary
  +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem">'

  +'<div style="background:var(--surface2);border-radius:var(--r);padding:.75rem;text-align:center"><div class="stat-label">Pico</div><div style="font-size:28px;font-weight:700;font-family:var(--mono);color:var(--green)">'+maxVal+'</div></div>'

// PARTES
function findByDoc(doc){
  var clean=doc.replace(/\D/g,"");
  if(clean.length<11)return null;
  for(var i=0;i<A.processes.length;i++){
    var p=A.processes[i];
    // Search in new multi-group partes
    var partes=p.partes||{};
    var keys=Object.keys(partes);
    for(var ki=0;ki<keys.length;ki++){
      var g=partes[keys[ki]]||[];
      for(var j=0;j<g.length;j++)if(g[j].c&&g[j].c.replace(/\D/g,"")===clean&&g[j].n)return g[j].n;
    }
    // Also search legacy transmitentes/adquirentes for old records
    var all=(p.transmitentes||[]).concat(p.adquirentes||[]);
    for(var j=0;j<all.length;j++)if(all[j].c&&all[j].c.replace(/\D/g,"")===clean&&all[j].n)return all[j].n;
  }
  return null;
}
function applyAC(prefix,i){
  var cEl=document.getElementById(prefix+"_c_"+i);
  var nEl=document.getElementById(prefix+"_n_"+i);
  var acEl=document.getElementById(prefix+"_ac_"+i);
  if(!cEl||!nEl||!acEl)return;
  if(nEl.value.trim()){acEl.style.display="none";return;}
  var found=findByDoc(cEl.value);
  if(found){
    acEl.style.display="block";
    var btn=document.createElement("div");
    btn.style.cssText="background:#e8f0f8;border:1px solid var(--accent);border-radius:var(--r);padding:7px 10px;font-size:12px;color:var(--accent);font-weight:600;cursor:pointer;margin-top:3px";
    btn.innerHTML='<i class="ti ti-user-check" style="margin-right:5px"></i>Encontrado: '+found+' — clique para usar';
    btn.onclick=function(){nEl.value=found;acEl.style.display="none";};
    acEl.innerHTML="";
    acEl.appendChild(btn);
  } else {
    acEl.style.display="none";
    acEl.innerHTML="";
  }
}

function tPartes(p){

function tCl(p,cl){
  var hidden=p.hiddenItems||{};
  var pg=gcp(p),h='<div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pg.pct+'%"></div></div><strong>'+pg.done+' de '+pg.total+' - '+pg.pct+'% '+(pg.pct===100?"&#10003;":"")+'</strong></div>';
  if(cl){
    for(var si=0;si<cl.sections.length;si++){
      var sec=cl.sections[si],sd=0;
      for(var ii=0;ii<sec.items.length;ii++)if(!hidden[si+"_"+ii]&&p.checklist&&p.checklist[si]&&p.checklist[si][ii])sd++;
      var hiddenCount=0;for(var hh=0;hh<sec.items.length;hh++)if(hidden[si+"_"+hh])hiddenCount++;
      var visTotal=sec.items.length-hiddenCount;
      h+='<div class="checklist-section"><div class="cl-sec-title">'+ex(sec.title)
      +'<span style="display:flex;align-items:center;gap:6px">'+sd+"/"+visTotal
      +(hiddenCount>0?'<button class="btn btn-sm" style="padding:2px 7px;background:#e0f2fe;border:1px solid #7dd3fc;color:#0369a1;font-size:10px" data-restore-sec="'+si+'" title="Restaurar '+hiddenCount+' item(ns) dispensado(s)"><i class="ti ti-eye"></i> '+hiddenCount+' dispensado(s)</button>':'')
      +'</span></div>';
      for(var ii2=0;ii2<sec.items.length;ii2++){

        var chk=p.checklist&&p.checklist[si]&&p.checklist[si][ii2];
        h+='<div class="check-item'+(chk?" checked":"")+'"><input type="checkbox"'+(chk?" checked":"")+ ' id="ck_'+si+'_'+ii2+'" data-si="'+si+'" data-ii="'+ii2+'"><label for="ck_'+si+'_'+ii2+'" style="flex:1">'+ex(sec.items[ii2])+'</label>'
        +'<button class="btn btn-danger btn-sm" style="padding:2px 6px;flex-shrink:0;margin-left:4px;opacity:.5" data-hide-item="'+si+'_'+ii2+'" title="Dispensar este documento"><i class="ti ti-eye-off"></i></button>'
        +'</div>';
      }
      h+='</div>';
    }
  }
  // Extra items section

  +'<span style="display:flex;align-items:center;gap:6px">'+extrasDone+"/"+extras.length
  +'<button class="btn btn-sm" style="padding:3px 8px;background:#fff7ed;border:1px solid #fed7aa;color:#c2410c;font-size:11px" id="bAddExtra"><i class="ti ti-plus"></i> Adicionar</button>'
  +'</span></div>';
  if(extras.length===0){
    h+='<div class="text-xs text-muted" style="padding:6px 8px">Nenhum item adicional. Clique em Adicionar.</div>';
  } else {
    for(var ei2=0;ei2<extras.length;ei2++){
      var echk=p.extraChecked&&p.extraChecked[ei2];
      h+='<div class="check-item'+(echk?" checked":"")+'"">'
      +'<input type="checkbox"'+(echk?" checked":"")+ ' id="eck_'+ei2+'" data-ei="'+ei2+'">'
      +'<label for="eck_'+ei2+'" style="flex:1">'+ex(extras[ei2])+'</label>'
      +'<button class="btn btn-secondary btn-sm" style="padding:3px 7px;flex-shrink:0;margin-left:4px" data-edit-extra="'+ei2+'" title="Editar"><i class="ti ti-pencil"></i></button>'

function bindArquivo(){
  var bPrev=document.getElementById("bArchPreview");
  if(bPrev)bPrev.onclick=function(){
    var from=document.getElementById("archFrom").value;
    var to=document.getElementById("archTo").value;
    if(!from||!to){alert("Selecione o periodo.");return;}
    var candidates=A.processes.filter(function(p){
      return (p.status||"cadastrado")==="registro"&&p.dataAbertura&&p.dataAbertura>=from&&p.dataAbertura<=to;
    });
    var prev=document.getElementById("archPreview");
    var bConf=document.getElementById("bArchConfirm");
    if(candidates.length===0){
      prev.innerHTML='<div class="alert alert-info"><i class="ti ti-info-circle"></i> Nenhum processo em Registro encontrado neste periodo.</div>';
      bConf.style.display="none";
      return;
    }
    var html='<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> <strong>'+candidates.length+' processo(s)</strong> serao arquivados:</div>';
    html+='<div style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);margin-top:.5rem">';
    for(var i=0;i<candidates.length;i++){
      html+='<div style="padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;display:flex;gap:1rem">'
        +'<span class="proto-num">'+ex(candidates[i].protocol)+'</span>'
        +'<span>'+ex(pnFromP(candidates[i]))+'</span>'
        +'<span class="text-muted">'+fd(candidates[i].dataAbertura)+'</span>'
        +'</div>';
    }
    html+='</div>';
    prev.innerHTML=html;
    bConf.style.display="inline-flex";
    bConf._candidates=candidates;
  };
  var bConf=document.getElementById("bArchConfirm");
  if(bConf)bConf.onclick=function(){
    var candidates=bConf._candidates||[];
    if(!candidates.length)return;
    if(!confirm("Arquivar "+candidates.length+" processo(s)? Esta acao pode ser desfeita individualmente."))return;
    var batch=db.batch();
    for(var i=0;i<candidates.length;i++){
      var ref=db.collection("processes").doc(candidates[i].id);
      batch.update(ref,{archived:true,archivedAt:new Date().toISOString(),archivedBy:A.user.id});
    }
    ssy(true);
    batch.commit().then(function(){
      ssy(false);
      document.getElementById("archPreview").innerHTML='<div class="alert-info" style="background:#dcfce7;border:1px solid #86efac;padding:.75rem;border-radius:var(--r);color:#166534"><i class="ti ti-check"></i> '+candidates.length+' processo(s) arquivados com sucesso!</div>';
      bConf.style.display="none";
      toast("Processos arquivados!");
      loadArchived();
    });
  };
  loadArchived();
}

function loadArchived(){
  var listEl=document.getElementById("archList");
  if(!listEl)return;
  db.collection("processes").where("archived","==",true).orderBy("archivedAt","desc").get().then(function(snap){
    if(snap.empty){listEl.innerHTML='<div class="empty-state" style="padding:1rem"><i class="ti ti-inbox"></i>Nenhum processo arquivado.</div>';return;}
    var docs=snap.docs.map(function(d){return d.data();});
    var h='<div class="table-wrap"><table><thead><tr><th>Protocolo</th><th>Natureza</th><th>Partes</th><th>Abertura</th><th>Arquivado em</th><th>Acoes</th></tr></thead><tbody>';
    for(var i=0;i<docs.length;i++){
      var ap=docs[i],an=gn(ap.natureza);
      h+='<tr>'
        +'<td><span class="proto-num">'+ex(ap.protocol)+'</span></td>'
        +'<td><span class="badge '+an.badge+'" style="font-size:10px">'+an.label.split(" ").slice(0,2).join(" ")+'</span></td>'
        +'<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+ex(pnFromP(ap))+'</td>'
        +'<td class="text-sm text-muted">'+fd(ap.dataAbertura)+'</td>'
        +'<td class="text-sm text-muted">'+fd(ap.archivedAt)+'</td>'
        +'<td><button class="btn btn-secondary btn-sm" data-unarch="'+ap.id+'" title="Desarquivar"><i class="ti ti-archive-off"></i></button>'
        +' <button class="btn btn-secondary btn-sm" data-op="'+ap.id+'" title="Abrir"><i class="ti ti-folder-open"></i></button>'
        +'</td></tr>';
    }
    h+='</tbody></table></div>';
    listEl.innerHTML=h;
    // Bind unarchive
    listEl.querySelectorAll("[data-unarch]").forEach(function(btn){
      btn.onclick=function(){
        if(!confirm("Desarquivar este processo?"))return;
        ssy(true);
        db.collection("processes").doc(btn.dataset.unarch).update({archived:false,archivedAt:null}).then(function(){
          ssy(false);toast("Processo desarquivado!");loadArchived();
        });
      };
    });
    // Bind open
    listEl.querySelectorAll("button[data-op]").forEach(function(btn){
      btn.onclick=function(){
        db.collection("processes").doc(btn.dataset.op).get().then(function(d){
          if(d.exists){A.sel=d.data();A.tab="dados";A.epartes={};A.modal="ver";renderModal();}
        });
      };
    });
  }).catch(function(e){
    listEl.innerHTML='<div class="alert alert-warning"><i class="ti ti-alert-triangle"></i> Configure o indice no Firebase para usar esta funcao. Erro: '+e.message+'</div>';
  });
}

      +'<div style="overflow-x:auto">'

function mResumo(p){
  var n=gn(p.natureza),s=gs(p.status||"cadastrado");
  var groups=glGroups(p.natureza);
  var partes=p.partes||{};
  // Pending docs
  var cl=A.checklists[p.natureza],pend=[];
  var hidden=p.hiddenItems||{};
  if(cl&&p.checklist){
    for(var si=0;si<cl.sections.length;si++)
      for(var ii=0;ii<cl.sections[si].items.length;ii++){
        if(hidden[si+"_"+ii])continue;
        if(!p.checklist[si]||!p.checklist[si][ii])pend.push(cl.sections[si].items[ii]);
      }
  }
  var extras=p.extraItems||[];
  for(var ei=0;ei<extras.length;ei++)if(!p.extraChecked||!p.extraChecked[ei])pend.push(extras[ei]);
  // Comments
  var comments=p.comments||[];
  // Build HTML
  var h='<div class="summary-modal"><div class="modal-header">'
    +'<div><div class="modal-title"><span class="proto-num">'+ex(p.protocol)+'</span> <span class="badge '+n.badge+'">'+n.label+'</span></div>'
    +'<div style="margin-top:4px"><span class="status-badge '+s.cls+'"><i class="ti '+s.icon+'"></i> '+s.label+'</span></div></div>'
    +'<button class="close-btn" id="cm">x</button>'
    +'</div>'
    +'<div class="modal-body" style="max-height:70vh;overflow-y:auto">';
  // Partes section
  h+='<div class="summary-section"><div class="summary-label">Partes envolvidas</div>';
  for(var gi=0;gi<groups.length;gi++){
    var gdata=partes[gi]||[];
    if(!gdata.length)continue;
    h+='<div style="margin-bottom:.5rem"><div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px">'+groups[gi]+'</div>';
    for(var pi=0;pi<gdata.length;pi++){
      var pt=gdata[pi];
      h+='<div class="summary-parte"><strong>'+ex(pt.n||"---")+'</strong>';
      if(pt.prof)h+=' | '+ex(pt.prof);
      if(pt.e)h+=' | '+ex(pt.e);
      if(pt.enot)h+=' | <span style="color:#166534;font-weight:600">&#128241; E-notariado'+(pt.enotFone?' - '+ex(pt.enotFone):'')+'</span>';
      h+='</div>';
    }
    h+='</div>';
  }
  // Fallback for old records
  if(!Object.keys(partes).length){
    var tr=p.transmitentes||[],ad=p.adquirentes||[];
    if(tr.length){h+='<div style="margin-bottom:.5rem"><div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px">Transmitente(s)</div>';for(var ti=0;ti<tr.length;ti++)h+='<div class="summary-parte"><strong>'+ex(tr[ti].n||"---")+'</strong></div>';h+='</div>';}
    if(ad.length){h+='<div style="margin-bottom:.5rem"><div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:3px">Adquirente(s)</div>';for(var ai=0;ai<ad.length;ai++)h+='<div class="summary-parte"><strong>'+ex(ad[ai].n||"---")+'</strong></div>';h+='</div>';}
  }
  h+='</div>';
  // Info section
  h+='<div class="summary-section">';
  h+='<div class="summary-label">Informacoes do processo</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">';
  h+='<div><span style="font-size:11px;color:var(--muted);font-weight:600">Cadastrado por</span><br><span style="font-size:13px">'+ex(gun(p.createdBy))+'</span></div>';
  h+='<div><span style="font-size:11px;color:var(--muted);font-weight:600">Data de abertura</span><br><span style="font-size:13px">'+fd(p.dataAbertura)+'</span></div>';
  +(p.responsavel?'<div><span style="font-size:11px;color:var(--muted);font-weight:600">Responsavel / Corretor</span><br><span style="font-size:13px">'+ex(p.responsavel)+'</span></div>':'')
  +(p.dataAssinatura?'<div><span style="font-size:11px;color:var(--muted);font-weight:600">Data de assinatura</span><br><span style="font-size:13px;font-weight:600;color:var(--green)">'+fd(p.dataAssinatura)+'</span></div>':'')
  +'</div>';
  // Pagamento
  h+='<div style="margin-top:.75rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">';
  h+='<span class="pago-badge '+(p.pago?'pago-sim':'pago-nao')+'">'+(p.pago?'&#10003; Pago':'&#9900; Pendente')+'</span>';
  +(p.pgInfo?'<span style="font-size:12px;color:var(--muted)">'+ex(p.pgInfo)+'</span>':'')
  +'</div>';
  h+='</div>';
  // Pending docs
  h+='<div class="summary-section"><div class="summary-label">Documentos pendentes '+(pend.length===0?'<span style="color:var(--green)">&#10003; Completo</span>':'('+pend.length+')')+'</div>';
  if(pend.length===0){
    h+='<div style="color:var(--green);font-size:13px;font-weight:600">&#10003; Todos os documentos apresentados!</div>';
  } else {
    for(var pdi=0;pdi<pend.length;pdi++){
      h+='<div class="summary-pend"><i class="ti ti-circle" style="color:var(--red);font-size:12px"></i>'+ex(pend[pdi])+'</div>';
    }
  }
  h+='</div>';
  // Comments
  h+='<div class="summary-section"><div class="summary-label">Comentarios ('+comments.length+')</div>';
  if(!comments.length){
    h+='<div style="color:var(--muted);font-size:12px">Nenhum comentario.</div>';
  } else {
    var sorted=[].concat(comments).reverse();
    for(var ci=0;ci<sorted.length;ci++){
      var c=sorted[ci];
      h+='<div class="summary-comment">'
        +'<div class="summary-comment-header">'
        +'<span style="font-weight:600;color:var(--accent)">'+ex(gun(c.authorId))+'</span>'
        +'<span style="color:var(--muted)">'+fdt(c.createdAt)+'</span>'
        +'</div>'
        +'<div style="font-size:12px;white-space:pre-wrap;word-break:break-word">'+ex(c.text)+'</div>'
        +'</div>';
    }
  }
  h+='</div>';
  h+='</div></div>';
  return h;
}

// Runtime tables (overwritten by Firebase on load)
var TABELA_NOTAS = JSON.parse(JSON.stringify(TABELA_NOTAS_DEFAULT));
var TABELA_REG = JSON.parse(JSON.stringify(TABELA_REG_DEFAULT));

function loadTabelaEmolumentos(){
  db.collection("config").doc("tabela_emolumentos").get().then(function(s){
    if(s.exists){
      if(s.data().notas&&s.data().notas.length)TABELA_NOTAS=s.data().notas;
      if(s.data().registro&&s.data().registro.length)TABELA_REG=s.data().registro;
    } else {
      // First time: save defaults to Firebase
      db.collection("config").doc("tabela_emolumentos").set({
        notas:TABELA_NOTAS_DEFAULT,
        registro:TABELA_REG_DEFAULT,
        ano:2026
      });
    }
  }).catch(function(){});
}

function recalcTabela(atos){
  for(var i=0;i<atos.length;i++){
    atos[i].issqn=Math.round(atos[i].emol*0.05*100)/100;
    atos[i].total=Math.round((atos[i].emol+atos[i].selo+atos[i].issqn)*100)/100;
  }
  return atos;
}

function getAtoByCode(cod, tabela){
  for(var i=0;i<tabela.length;i++)if(tabela[i].cod===cod)return tabela[i];
  return null;
}

function findByValueNew(tabela, valor){
  var v=parseFloat(String(valor).replace(/\./g,"").replace(",","."));
  if(isNaN(v)||v<=0)return null;
  for(var i=0;i<tabela.length-1;i++){
    var desc=tabela[i].desc;
    // Faixa is always at the START: "0 a 15.000,00 - ..." or "15.000,01 a 30.000,00 - ..."
    var firstA=desc.indexOf(" a ");
    if(firstA<0)continue;
    var minStr=desc.substring(0,firstA).replace(/[^0-9.,]/g,"");
    var afterA=desc.substring(firstA+3);
    // Max ends at " - " or end of string
    var dashIdx=afterA.indexOf(" - ");
    var maxStr=(dashIdx>=0?afterA.substring(0,dashIdx):afterA).replace(/[^0-9.,]/g,"");
    var min=parseFloat(minStr.replace(/\./g,"").replace(",","."));
    var max=parseFloat(maxStr.replace(/\./g,"").replace(",","."));
    if(!isNaN(min)&&!isNaN(max)&&v>=min&&v<=max)return tabela[i];
  }
  return tabela[tabela.length-1];
}

function getNotasTable(nat){
  if(nat==="cv_urbano"||nat==="cv_rural")return NOTAS_CV;
  if(nat==="inventario"||nat==="divorcio")return NOTAS_INV;
  if(nat==="distrato")return NOTAS_DIST;
  return NOTAS_CV;
}

function findByValue(table, valor){
  // Parse valor string to number
  var v = parseFloat(String(valor).replace(/\./g,"").replace(",","."));
  if(isNaN(v)||v<=0)return null;
  for(var i=0;i<table.length-1;i++){
    var desc=table[i].desc;
    var parts=desc.split(" a ");
    if(parts.length===2){
      var min=parseFloat(parts[0].replace(/\./g,"").replace(",","."));
      var max=parseFloat(parts[1].replace(/\./g,"").replace(",","."));
      if(v>=min&&v<=max)return table[i];
    }
  }
  // Last item "A partir de..."
  return table[table.length-1];
}

function calcItemVal(it){
  var emolIssqn=(it.emolBase||0)+(it.issqnBase||0);
  var acr=(it.acrescimo||0)/100;
  return Math.round((emolIssqn*(1+acr)+(it.seloBase||0))*100)/100;
}

function fmtBRL(v){
  return "R$ "+v.toFixed(2).replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

  })()

        +'</div></td>'

    }
    h+='</tbody></table></div></div>';
  }

  return h;
}

function calcOrcamento(){
  var nat=document.getElementById("orcNat").value;
  var cliente=document.getElementById("orcCliente").value.trim();
  // Collect all imovel values
  var imovEls=document.querySelectorAll(".orc-imovel-val");
  var imoveis=[];
  for(var ii=0;ii<imovEls.length;ii++){
    var v=imovEls[ii].value.trim();
    if(v)imoveis.push(v);
  }
  // Fallback to single value field
  if(!imoveis.length){
    var sv=document.getElementById("orcValor");
    if(sv&&sv.value.trim())imoveis.push(sv.value.trim());
  }
  if(!imoveis.length&&!plNat2.codN){toast("Informe ao menos um valor de imovel.","error");return;}
  if(!imoveis.length)imoveis=[{mat:'',val:''}]; // placeholder for custom nats
  // Get custom codes from A.nats (reliable) then PLABELS
  var plNat2={};
  if(A.nats){for(var nci2=0;nci2<A.nats.length;nci2++){if(A.nats[nci2].key===nat){plNat2={codN:A.nats[nci2].codN||'',codR:A.nats[nci2].codR||''};break;}}}
  if(PLABELS[nat])Object.assign(plNat2,PLABELS[nat]);
  var faixaMin=568,faixaMax=618;
  if(nat==="inventario"||nat==="divorcio"){faixaMin=619;faixaMax=669;}
  if(nat==="distrato"){faixaMin=704;faixaMax=754;}
  var notasFaixa=plNat2.codN
    ?parseCodFaixa(plNat2.codN,TABELA_NOTAS)
    :TABELA_NOTAS.filter(function(a){return a.cod>=faixaMin&&a.cod<=faixaMax;});
  var regFaixa=plNat2.codR
    ?parseCodFaixa(plNat2.codR,TABELA_REG)
    :TABELA_REG.filter(function(a){return a.cod>=157&&a.cod<=207;});
  var regFaixa=TABELA_REG.filter(function(a){return a.cod>=157&&a.cod<=207;});
  var notasItens=[];
  var regItens=[];
  for(var i=0;i<imoveis.length;i++){
    var valorStr=typeof imoveis[i]==="object"?(imoveis[i].val||''):imoveis[i];
    var label=imoveis.length>1?" (Imovel "+(i+1)+")"+(imoveis[i].mat?' - Mat.'+imoveis[i].mat:''):""
    var ato=findByValueNew(notasFaixa,valorStr);
    if(ato)notasItens.push({cod:ato.cod,qtd:1,
      desc:"ESCR COM VALOR DECL - "+ato.desc+label,
      emolBase:ato.emol,issqnBase:ato.issqn,seloBase:ato.selo,
      val:ato.total,acrescimo:0,removivel:true});
    var regAto=findByValueNew(regFaixa,valorStr);
    if(regAto)regItens.push({cod:regAto.cod,qtd:1,
      desc:"Reg. Geral c/ valor decl., de "+regAto.desc+label,
      emolBase:regAto.emol,issqnBase:regAto.issqn,seloBase:regAto.selo,
      val:regAto.total,acrescimo:0,removivel:true});
  }
  // Fixed items - only once
  var a154=getAtoByCode(154,TABELA_REG);
  var a340=getAtoByCode(340,TABELA_REG);
  var a456=getAtoByCode(456,TABELA_REG);
  var a453=getAtoByCode(453,TABELA_REG);
  if(a154)regItens.unshift({cod:154,qtd:1,desc:a154.desc,emolBase:a154.emol,issqnBase:a154.issqn,seloBase:a154.selo,val:a154.total,acrescimo:0,removivel:true});
  if(a340)regItens.push({cod:340,qtd:1,desc:a340.desc,emolBase:a340.emol,issqnBase:a340.issqn,seloBase:a340.selo,val:a340.total,acrescimo:0,removivel:true});
  if(a456)regItens.push({cod:456,qtd:1,desc:a456.desc,emolBase:a456.emol,issqnBase:a456.issqn,seloBase:a456.selo,val:a456.total,acrescimo:0,removivel:true});
  if(a453)regItens.push({cod:453,qtd:1,desc:a453.desc,emolBase:a453.emol,issqnBase:a453.issqn,seloBase:a453.selo,val:a453.total,acrescimo:0,removivel:true});
  A.orc=A.orc||{};
  A.orc.notasItens=notasItens;
  A.orc.regItens=regItens;
  A.orc.natureza=nat;
  A.orc.imoveis=imoveis;
  A.orc.valor=imoveis[0]||"";
  A.orc.cliente=cliente;
  renderOrcPreview(notasItens,regItens);
}

function bindOrcPreview(){
  var orc=A.orc||{};
  var notasItens=orc.notasItens||[];
  var regItens=orc.regItens||[];

  // Qtd changes notas
  var nQtds=document.querySelectorAll("[data-notas-qtd]");
  for(var i=0;i<nQtds.length;i++)(function(inp){
    inp.oninput=function(){
      notasItens[parseInt(inp.dataset.notasQtd)].qtd=parseInt(inp.value)||1;
      renderOrcPreview(notasItens,regItens);
    };
  })(nQtds[i]);

  // Qtd changes reg
  var rQtds=document.querySelectorAll("[data-reg-qtd]");
  for(var i=0;i<rQtds.length;i++)(function(inp){
    inp.oninput=function(){
      regItens[parseInt(inp.dataset.regQtd)].qtd=parseInt(inp.value)||1;
      renderOrcPreview(notasItens,regItens);
    };
  })(rQtds[i]);

  // Acrescimo notas
  var nAcrs=document.querySelectorAll("[data-notas-acr]");
  for(var i=0;i<nAcrs.length;i++)(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.dataset.notasAcr);
      var pct=parseInt(btn.dataset.pct);
      notasItens[idx].acrescimo=notasItens[idx].acrescimo===pct?0:pct;
      notasItens[idx].val=calcItemVal(notasItens[idx]);
      renderOrcPreview(notasItens,regItens);
    };
  })(nAcrs[i]);
  // Acrescimo reg
  var rAcrs=document.querySelectorAll("[data-reg-acr]");
  for(var i=0;i<rAcrs.length;i++)(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.dataset.regAcr);
      var pct=parseInt(btn.dataset.pct);
      regItens[idx].acrescimo=regItens[idx].acrescimo===pct?0:pct;
      regItens[idx].val=calcItemVal(regItens[idx]);
      renderOrcPreview(notasItens,regItens);
    };
  })(rAcrs[i]);
  // Remove notas
  var nRems=document.querySelectorAll("[data-notas-rem]");
  for(var i=0;i<nRems.length;i++)(function(btn){
    btn.onclick=function(){
      notasItens.splice(parseInt(btn.dataset.notasRem),1);
      renderOrcPreview(notasItens,regItens);
    };
  })(nRems[i]);

  // Remove reg
  var rRems=document.querySelectorAll("[data-reg-rem]");
  for(var i=0;i<rRems.length;i++)(function(btn){
    btn.onclick=function(){
      regItens.splice(parseInt(btn.dataset.regRem),1);
      renderOrcPreview(notasItens,regItens);
    };
  })(rRems[i]);

  // Add notas avulso
  var bAddN=document.getElementById("bAddNotasAv");
  if(bAddN)bAddN.onclick=function(){
    var sel=document.getElementById("selNotasAv");
    var qtd=parseInt(document.getElementById("qtdNotasAv").value)||1;
    if(!sel.value)return;
    var av=getAtoByCode(parseInt(sel.value),TABELA_NOTAS);
    if(!av)return;
    notasItens.push({cod:av.cod,qtd:qtd,desc:av.desc,emolBase:av.emol,issqnBase:av.issqn,seloBase:av.selo,val:av.total,acrescimo:0,removivel:true});
    renderOrcPreview(notasItens,regItens);
  };

  // Add reg avulso
  var bAddR=document.getElementById("bAddRegAv");
  if(bAddR)bAddR.onclick=function(){
    var sel=document.getElementById("selRegAv");
    var qtd=parseInt(document.getElementById("qtdRegAv").value)||1;
    if(!sel.value)return;
    var rav=getAtoByCode(parseInt(sel.value),TABELA_REG);
    if(!rav)return;
    regItens.push({cod:rav.cod,qtd:qtd,desc:rav.desc,emolBase:rav.emol,issqnBase:rav.issqn,seloBase:rav.selo,val:rav.total,acrescimo:0,removivel:true});
    renderOrcPreview(notasItens,regItens);
  };

  // Entrada input - update DOM only, no rebuild
  var orcEntradaEl=document.getElementById("orcEntrada");

    var subtR=0;for(var i=0;i<regItens.length;i++)subtR+=regItens[i].qtd*regItens[i].val;

function getPartesStr(p){
  var partes=p.partes||{};
  var keys=Object.keys(partes);
  var names=[];
  for(var ki=0;ki<keys.length;ki++){
    var g=partes[keys[ki]]||[];
    for(var i=0;i<g.length;i++)if(g[i].n)names.push(g[i].n);
  }
  if(!names.length){
    var tr=p.transmitentes||[];var ad=p.adquirentes||[];
    for(var i=0;i<tr.length;i++)if(tr[i].n)names.push(tr[i].n);
    for(var i=0;i<ad.length;i++)if(ad[i].n)names.push(ad[i].n);
  }
  return names.join(" / ");
}

function getLastComment(p){
  var comments=p.comments||[];
  if(!comments.length)return "";
  var last=comments[comments.length-1];
  var autor=gun(last.authorId)||"";
  var texto=last.text||"";
  var data=last.createdAt?last.createdAt.split("T")[0]:"";
  return "["+data+"] "+autor+": "+texto.substring(0,100)+(texto.length>100?"...":"");
}

function gerarExcelBackup(processos){
  // Build CSV/Excel compatible data
  var rows=[];
  var header=[
    "Protocolo","Natureza","Status","Partes","Matricula(s)",
    "Data Abertura","Data Assinatura","Responsavel/Corretor",
    "Valor Imovel","Pagamento","Info Pagamento",
    "Cadastrado por","Data Cadastro","Arquivado","Ultimo Comentario"
  ];
  rows.push(header);

  for(var i=0;i<processos.length;i++){
    var p=processos[i];
    var natLabel=gn(p.natureza).label;
    var stLabel=gs(p.status||"cadastrado").label;
    var partes=getPartesStr(p);
    var lastCom=getLastComment(p);
    var cadBy="";
    for(var u=0;u<A.users.length;u++)if(A.users[u].id===p.createdBy){cadBy=A.users[u].name;break;}
    var dataCAd=p.createdAt?p.createdAt.split("T")[0]:"";

    rows.push([
      p.protocol||"",
      natLabel,
      stLabel,
      partes,
      p.matriculas||"",
      p.dataAbertura||"",
      p.dataAssinatura||"",
      p.responsavel||"",
      p.valor||"",
      p.pago?"PAGO":"PENDENTE",
      p.pgInfo||"",
      cadBy,
      dataCAd,
      p.archived?"SIM":"NAO",
      lastCom
    ]);
  }

  // Convert to CSV with BOM for Excel UTF-8
  var bom="\uFEFF";
  var csv=bom+rows.map(function(row){
    return row.map(function(cell){
      var s=String(cell||"").replace(/"/g,'""');
      if(s.indexOf(",")>=0||s.indexOf('"')>=0||s.indexOf("\n")>=0)s='"'+s+'"';
      return s;
    }).join(";");
  }).join("\n");

  // Download
  var hoje=new Date().toISOString().split("T")[0];
  var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="backup-protocolos-"+hoje+".csv";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function bindSugestoes(){
  // Load if needed
  if(!A.sugestoes){loadSugestoes();return;}

  // Enviar nova sugestao
  var bEnv=document.getElementById("bEnviarSug");
  if(bEnv)bEnv.onclick=function(){
    var texto=document.getElementById("sugTexto").value.trim();
    var tipo=document.getElementById("sugTipo").value;
    var err=document.getElementById("sugErr");
    if(!texto){if(err)err.innerHTML='<div class="error-msg">Escreva sua sugestao antes de enviar.</div>';return;}
    bEnv.disabled=true;
    var sug={
      id:"sug"+Date.now(),
      texto:texto,
      tipo:tipo,
      autorId:A.user.id,
      autorNome:A.user.name,
      criadoEm:new Date().toISOString().split("T")[0],
      status:"pendente",
      respostaSup:""
    };
    ssy(true);
    db.collection("sugestoes").doc(sug.id).set(sug).then(function(){
      ssy(false);
      bEnv.disabled=false;
      if(!A.sugestoes)A.sugestoes=[];
      A.sugestoes.unshift(sug);
      toast("Sugestao enviada!");
      render();
    }).catch(function(e){
      ssy(false);bEnv.disabled=false;
      if(err)err.innerHTML='<div class="error-msg">Erro: '+e.message+'</div>';
    });
  };

  // Atender sugestao (supervisor)
  var okBtns=document.querySelectorAll("[data-sug-ok]");
  for(var i=0;i<okBtns.length;i++)(function(btn){
    btn.onclick=function(){
      var id=btn.dataset.sugOk;

          if(A.sugestoes[j].id===id){A.sugestoes[j].status="atendido";A.sugestoes[j].respostaSup=resp;break;}

        toast("Sugestao marcada como atendida!");render();
      });
    };
  })(okBtns[i]);

  // Rejeitar sugestao (supervisor)
  var rejBtns=document.querySelectorAll("[data-sug-rej]");
  for(var i=0;i<rejBtns.length;i++)(function(btn){
    btn.onclick=function(){
      var id=btn.dataset.sugRej;

        }
        toast("Sugestao rejeitada.");render();
      });
    };
  })(rejBtns[i]);
}

  for(var i=0;i<ORC_RAPIDOS.length;i++){
    var o=ORC_RAPIDOS[i];
    var active=sel&&sel.id===o.id;
    h+='<button class="btn btn-sm" data-orc-rap="'+o.id+'" style="'
      +'text-align:left;padding:8px 12px;display:flex;align-items:center;gap:6px;'
      +(active?'background:var(--accent);color:#fff;':'background:var(--surface2);color:var(--text);')
      +'border:1px solid '+(active?'var(--accent)':'var(--border)')
      +';border-radius:var(--r);font-size:12px;font-weight:600">'
      +'<i class="ti '+o.icon+'"></i>'+ex(o.label)+'</button>';
  }
  h+='</div>';

  // Show selected orc rapido
  if(sel){
    h+=renderOrcRapidoForm(sel);
  }
  h+='</div>';
  return h;
}

function buildOrcRapidoItens(orcDef){
  var itens=[];
  for(var i=0;i<orcDef.itens.length;i++){
    var def=orcDef.itens[i];
    var ato=getAtoByCode(def.cod,TABELA_NOTAS);
    if(ato){
      itens.push({
        cod:ato.cod,qtd:def.qtd,desc:ato.desc,
        emolBase:ato.emol,issqnBase:ato.issqn,seloBase:ato.selo,
        val:ato.total,acrescimo:0
      });
    }
  }
  return itens;
}

  for(var i=0;i<allNotas.length;i++){

  h+='</tbody></table>';

  // Add avulso notas
  var avOptsN='<option value="">-- Adicionar ato avulso de Notas --</option>';
  for(var i=0;i<TABELA_NOTAS.length;i++){

  // Total

    +'</div>'
    +'</div>';
  return h;
}

function recalcRapTotals(){
  if(!A.orcRapido)return;
  var sel=A.orcRapido;
  var allN=(sel.notasItens||[]).concat(sel.avulsosNotas||[]);
  var allR=(sel.avulsosReg||[]);
  var subtN=0;for(var i=0;i<allN.length;i++)subtN+=allN[i].qtd*calcItemVal(allN[i]);
  var subtR=0;for(var i=0;i<allR.length;i++)subtR+=allR[i].qtd*calcItemVal(allR[i]);
  var total=subtN+subtR;
  // Update row totals
  var nQtdEls=document.querySelectorAll("[data-rap-notas-qtd]");
  for(var i=0;i<nQtdEls.length;i++){
    var it=allN[i];if(!it)continue;
    var row=nQtdEls[i].closest('tr');
    if(!row)continue;
    var tds=row.querySelectorAll('td');
    if(tds[3])tds[3].textContent=fmtBRL(it.qtd*calcItemVal(it));
  }
  var rQtdEls=document.querySelectorAll("[data-rap-reg-qtd]");
  for(var i=0;i<rQtdEls.length;i++){
    var it=allR[i];if(!it)continue;
    var row=rQtdEls[i].closest('tr');
    if(!row)continue;
    var tds=row.querySelectorAll('td');
    if(tds[3])tds[3].textContent=fmtBRL(it.qtd*calcItemVal(it));
  }
  // Update subtotals and total
  var subNEl=document.getElementById('rapSubtN');
  if(subNEl)subNEl.textContent='SUBTOTAL NOTAS: '+fmtBRL(subtN);
  var subREl=document.getElementById('rapSubtR');
  if(subREl)subREl.textContent='SUBTOTAL REGISTRO: '+fmtBRL(subtR);
  var totEl=document.getElementById('rapTotal');
  if(totEl)totEl.textContent='TOTAL: '+fmtBRL(total);
}

function bindOrcRapidos(){
  // Select ato rapido
  var rapBtns=document.querySelectorAll("[data-orc-rap]");
  if(!rapBtns.length)return;
  for(var i=0;i<rapBtns.length;i++)(function(btn){
    btn.onclick=function(){
      var id=btn.dataset.orcRap;
      if(A.orcRapido&&A.orcRapido.id===id){A.orcRapido=null;render();return;}
      var def=null;
      for(var j=0;j<ORC_RAPIDOS.length;j++){if(ORC_RAPIDOS[j].id===id){def=ORC_RAPIDOS[j];break;}}
      if(!def)return;
      A.orcRapido={
        id:def.id,label:def.label,temReg:def.temReg,
        notasItens:buildOrcRapidoItens(def),
        regItens:[],avulsosNotas:[],avulsosReg:[],cliente:""
      };
      render();
    };
  })(rapBtns[i]);

  if(!A.orcRapido)return;

  // Close
  var bClose=document.querySelector("[data-orc-rap-close]");
  if(bClose)bClose.onclick=function(){A.orcRapido=null;render();};

  var sel=A.orcRapido;

  // Cliente field save
  var cEl=document.getElementById("orcRapCliente");
  if(cEl)cEl.oninput=function(){sel.cliente=cEl.value;};

  // Qtd notas
  var nQtds=document.querySelectorAll("[data-rap-notas-qtd]");
  for(var i=0;i<nQtds.length;i++)(function(inp){

// =============================================
// VALIDACAO CPF / CNPJ
// =============================================
function validarCPF(cpf){
  cpf=cpf.replace(/[^\d]/g,"");
  if(cpf.length!==11)return false;
  if(/^(\d)\1{10}$/.test(cpf))return false;
  var s=0;
  for(var i=0;i<9;i++)s+=parseInt(cpf[i])*(10-i);
  var r=s%11<2?0:11-s%11;
  if(r!==parseInt(cpf[9]))return false;
  s=0;
  for(var i=0;i<10;i++)s+=parseInt(cpf[i])*(11-i);
  r=s%11<2?0:11-s%11;
  return r===parseInt(cpf[10]);
}

function validarCNPJ(cnpj){
  cnpj=cnpj.replace(/[^\d]/g,"");
  if(cnpj.length!==14)return false;
  if(/^(\d)\1{13}$/.test(cnpj))return false;
  var t=[5,4,3,2,9,8,7,6,5,4,3,2],s=0;
  for(var i=0;i<12;i++)s+=parseInt(cnpj[i])*t[i];
  var r=s%11<2?0:11-s%11;
  if(r!==parseInt(cnpj[12]))return false;
  t=[6,5,4,3,2,9,8,7,6,5,4,3,2];s=0;
  for(var i=0;i<13;i++)s+=parseInt(cnpj[i])*t[i];
  r=s%11<2?0:11-s%11;
  return r===parseInt(cnpj[13]);
}

function validarCpfCnpj(val){
  var digits=val.replace(/[^\d]/g,"");
  if(digits.length===0)return{ok:false,msg:""};
  if(digits.length<=11){
    if(digits.length<11)return{ok:false,msg:"CPF incompleto ("+digits.length+"/11 digitos)"};
    return validarCPF(digits)?{ok:true,msg:""}:{ok:false,msg:"CPF invalido — digitos verificadores incorretos"};
  } else {
    if(digits.length<14)return{ok:false,msg:"CNPJ incompleto ("+digits.length+"/14 digitos)"};
    return validarCNPJ(digits)?{ok:true,msg:""}:{ok:false,msg:"CNPJ invalido — digitos verificadores incorretos"};
  }
}

function bindCpfValidation(input){
  // Create or find error div
  var errId=input.id+"_cpferr";
  var errDiv=document.getElementById(errId);
  if(!errDiv){
    errDiv=document.createElement("div");
    errDiv.id=errId;
    errDiv.style.cssText="font-size:11px;margin-top:2px;min-height:14px";
    input.parentNode.insertBefore(errDiv,input.nextSibling);
  }
  function check(){
    var val=input.value.trim();
    if(!val){errDiv.textContent="";input.style.borderColor="";return;}
    var res=validarCpfCnpj(val);
    if(res.ok){
      errDiv.textContent="\u2714 CPF/CNPJ valido";
      errDiv.style.color="var(--green)";
      input.style.borderColor="var(--green)";
    } else if(res.msg){
      errDiv.textContent="\u26A0 "+res.msg;
      errDiv.style.color="#991b1b";
      input.style.borderColor="#991b1b";
    } else {
      errDiv.textContent="";
      input.style.borderColor="";
    }
  }
  input.oninput=function(){
    // Auto-format CPF/CNPJ
    var digits=input.value.replace(/[^\d]/g,"");
    if(digits.length<=11){
      input.value=digits.replace(/(\d{3})(\d{3})(\d{3})(\d{0,2})/,"$1.$2.$3-$4").replace(/-$/,"").replace(/\.$/,"");
    } else {
      input.value=digits.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{0,2})/,"$1.$2.$3/$4-$5").replace(/-$/,"").replace(/\/$/,"");
    }
    check();
  };
  input.onblur=check;
  // Run immediately if value already set
  if(input.value)check();
}
