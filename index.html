    +'<button class="btn btn-secondary btn-sm" id="bAddVinc" style="font-size:11px"><i class="ti ti-link"></i> Vincular</button>'
    +'</div>';
  if(!vincs.length){
    h+='<div style="font-size:12px;color:var(--muted);font-style:italic">Nenhum protocolo vinculado.</div>';
  } else {
    for(var i=0;i<vincs.length;i++){
      var vp=null;
      for(var j=0;j<A.processes.length;j++)if(A.processes[j].id===vincs[i]){vp=A.processes[j];break;}
      h+='<div style="display:flex;align-items:center;gap:.5rem;padding:5px 0;border-bottom:1px dotted var(--border)">'
        +'<span style="font-family:var(--mono);font-weight:700;font-size:13px;color:var(--accent)">'+(vp?ex(vp.protocol):vincs[i])+'</span>'
        +(vp?'<span style="font-size:11px;color:var(--muted)">'+ex(gn(vp.natureza).label)+'</span>':'')
        +(vp?'<button class="btn btn-secondary btn-sm" style="font-size:10px;padding:2px 6px" data-open-vinc="'+vp.id+'"><i class="ti ti-folder-open"></i></button>':'')
        +'<button class="btn btn-danger btn-sm" style="font-size:10px;padding:2px 6px" data-rem-vinc="'+vincs[i]+'"><i class="ti ti-unlink"></i></button>'
        +'</div>';
    }
  }
  // Search box
  h+='<div id="vincSearch" style="display:none;margin-top:.5rem">'
    +'<div style="display:flex;gap:6px">'
    +'<input type="text" id="vincQ" placeholder="Numero do protocolo..." style="flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px">'
    +'<button class="btn btn-primary btn-sm" id="bVincBuscar"><i class="ti ti-search"></i> Buscar</button>'
    +'<button class="btn btn-secondary btn-sm" id="bVincCancel"><i class="ti ti-x"></i></button>'
    +'</div>'
    +'<div id="vincResult" style="margin-top:6px"></div>'
    +'</div>'
    +'</div>';
  return h;
}

function bindVinculados(p){
  var bAdd=document.getElementById("bAddVinc");
  if(bAdd)bAdd.onclick=function(){
    var box=document.getElementById("vincSearch");
    if(box)box.style.display=box.style.display==="none"?"block":"none";
  };

  var bCancel=document.getElementById("bVincCancel");
  if(bCancel)bCancel.onclick=function(){
    document.getElementById("vincSearch").style.display="none";
  };

  var bBuscar=document.getElementById("bVincBuscar");
  if(bBuscar)bBuscar.onclick=function(){
    var q=document.getElementById("vincQ").value.trim().toLowerCase();
    var res=document.getElementById("vincResult");
    if(!q){res.innerHTML='';return;}
    var found=A.processes.filter(function(x){
      return x.id!==p.id&&x.protocol&&x.protocol.toLowerCase().indexOf(q)>=0;
    });
    if(!found.length){res.innerHTML='<div style="font-size:12px;color:var(--muted)">Nenhum protocolo encontrado.</div>';return;}
    var h='';
    for(var i=0;i<Math.min(found.length,5);i++){
      var f=found[i];
      h+='<div style="display:flex;align-items:center;gap:.5rem;padding:5px 8px;background:var(--surface2);border-radius:var(--r);margin-bottom:4px">'
        +'<span style="font-family:var(--mono);font-weight:700;font-size:13px">'+ex(f.protocol)+'</span>'
        +'<span style="font-size:11px;color:var(--muted);flex:1">'+ex(gn(f.natureza).label)+'</span>'
        +'<button class="btn btn-primary btn-sm" style="font-size:10px" data-link-vinc="'+f.id+'"><i class="ti ti-link"></i> Vincular</button>'
        +'</div>';
    }
    res.innerHTML=h;
    // Bind link buttons
    res.querySelectorAll("[data-link-vinc]").forEach(function(btn){
      btn.onclick=function(){
        var vid=btn.dataset.linkVinc;
        if(!p.vinculados)p.vinculados=[];
        if(p.vinculados.indexOf(vid)>=0){toast("Ja vinculado.","error");return;}
        p.vinculados.push(vid);
        // Also link reverse
        var vp=null;for(var j=0;j<A.processes.length;j++)if(A.processes[j].id===vid){vp=A.processes[j];break;}
        ssy(true);
        db.collection("processes").doc(p.id).update({vinculados:p.vinculados}).then(function(){
          if(vp){
            var rv=vp.vinculados||[];
            if(rv.indexOf(p.id)<0){rv.push(p.id);db.collection("processes").doc(vp.id).update({vinculados:rv});}
          }
          ssy(false);toast("Protocolo vinculado!");
          document.getElementById("vincSearch").style.display="none";
          var sec=document.getElementById("secVinculados");
          if(sec)sec.outerHTML=rVinculados(p);
          bindVinculados(p);
        });
      };
    });
  };

  // Remove vinculado
  document.querySelectorAll("[data-rem-vinc]").forEach(function(btn){
    btn.onclick=function(){
      var vid=btn.dataset.remVinc;
      if(!confirm("Remover vinculo?"))return;
      p.vinculados=(p.vinculados||[]).filter(function(x){return x!==vid;});
      ssy(true);
      db.collection("processes").doc(p.id).update({vinculados:p.vinculados}).then(function(){
        ssy(false);toast("Vinculo removido.");
        var sec=document.getElementById("secVinculados");
        if(sec)sec.outerHTML=rVinculados(p);
        bindVinculados(p);
      });
    };
  });

  // Open vinculado
  document.querySelectorAll("[data-open-vinc]").forEach(function(btn){
    btn.onclick=function(){
      var vid=btn.dataset.openVinc;
      for(var i=0;i<A.processes.length;i++)if(A.processes[i].id===vid){A.sel=A.processes[i];break;}
      A.tab="dados";A.modal="ver";renderModal();
    };
  });
}


// =============================================
// FIREBASE USAGE MONITOR
// =============================================
function loadFirebaseUsage(){
  var el=document.getElementById("firebaseUsage");
  if(!el)return;

  // Constants
  var LIMIT_STORAGE_MB=1024;
  var LIMIT_READS=50000;
  var LIMIT_WRITES=20000;
  var KB_PER_PROC=5; // avg KB per protocol doc

  // Count processes
  var totalProcs=A.processes?A.processes.length:0;

  // Count archived
  db.collection("processes").where("archived","==",true).get().then(function(arqSnap){
    var totalArq=arqSnap.size;
    var totalAll=totalProcs+totalArq;

    // Count users
    var totalUsers=A.users?A.users.length:0;

    // Count orcamentos
    db.collection("orcamentos").get().then(function(orcSnap){
      var totalOrc=orcSnap.size;

      // Count sugestoes
      db.collection("sugestoes").get().then(function(sugSnap){
        var totalSug=sugSnap.size;

        // Estimate storage
        var estKB=(totalAll*KB_PER_PROC)+(totalOrc*2)+(totalUsers*1)+(totalSug*1);
        var estMB=estKB/1024;
        var estPctStorage=Math.min((estMB/LIMIT_STORAGE_MB)*100,100);

        // Days used (from first process)
        var firstDate=null;
        if(A.processes&&A.processes.length){
          for(var i=0;i<A.processes.length;i++){
            var d=A.processes[i].createdAt;
            if(d&&(!firstDate||d<firstDate))firstDate=d;
          }
        }
        var diasUso=firstDate?Math.floor((Date.now()-new Date(firstDate).getTime())/(1000*60*60*24)):1;
        var diasUso=Math.max(diasUso,1);
        var diasUteisAno=260;
        var procsPerDay=diasUso>0?(totalAll/diasUso).toFixed(1):8;
        var procsPerYear=Math.round(parseFloat(procsPerDay)*diasUteisAno);

        // Projections
        var anos5=totalAll+(procsPerYear*5);
        var mb5=(anos5*KB_PER_PROC)/1024;
        var pct5=Math.min((mb5/LIMIT_STORAGE_MB)*100,100);

        // Years until limit
        var mbPerYear=(procsPerYear*KB_PER_PROC)/1024;
        var anosRestantes=mbPerYear>0?Math.round((LIMIT_STORAGE_MB-estMB)/mbPerYear):999;

        function fmtBar(pct,color){
          return '<div style="flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden">'
            +'<div style="height:100%;border-radius:5px;width:'+Math.max(pct,0.5).toFixed(1)+'%;background:'+color+'"></div>'
            +'</div>';
        }
        function fmtPct(pct){
          return '<span style="font-size:12px;color:var(--muted);min-width:45px;text-align:right">'+pct.toFixed(1)+'%</span>';
        }
        function metricCard(val,label,sub,color){
          return '<div style="background:var(--surface2);border-radius:var(--r);padding:.75rem 1rem;text-align:center">'
            +'<div style="font-size:20px;font-weight:700;font-family:var(--mono);color:'+color+'">'+val+'</div>'
            +'<div style="font-size:12px;font-weight:600;color:var(--text);margin:2px 0">'+label+'</div>'
            +'<div style="font-size:11px;color:var(--muted)">'+sub+'</div>'
            +'</div>';
        }

        var html='';

        // Metric cards
        html+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.25rem">'
          +metricCard(totalAll,'Protocolos','ativos + arquivados','#1a3a5c')
          +metricCard(estMB.toFixed(2)+' MB','Armazenamento','estimado atual','#166534')
          +metricCard(procsPerDay+'/dia','Ritmo atual','média de cadastros','#854d0e')
          +metricCard(anosRestantes+' anos','Capacidade','restante no plano grátis','#1a5276')
          +'</div>';

        // Bars
        html+='<div style="background:var(--surface2);border-radius:var(--r);padding:1rem;margin-bottom:1rem">'
          +'<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:.75rem">Limites do plano gratuito</div>';

        // Storage bar
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
          +'<span style="font-size:12px;color:var(--muted);min-width:120px">Armazenamento</span>'
          +fmtBar(estPctStorage,'#1a3a5c')
          +fmtPct(estPctStorage)
          +'<span style="font-size:11px;color:var(--muted)">'+estMB.toFixed(1)+'MB / 1GB</span>'
          +'</div>';

        // Writes bar (estimated daily)
        var estWrites=Math.round(parseFloat(procsPerDay)*3);
        var pctWrites=(estWrites/LIMIT_WRITES)*100;
        html+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
          +'<span style="font-size:12px;color:var(--muted);min-width:120px">Escritas/dia</span>'
          +fmtBar(pctWrites,'#166534')
          +fmtPct(pctWrites)
          +'<span style="font-size:11px;color:var(--muted)">~'+estWrites+' / 20.000</span>'
          +'</div>';

        // Reads bar
        var estReads=Math.round(totalProcs*0.5*5);
        var pctReads=Math.min((estReads/LIMIT_READS)*100,100);
        html+='<div style="display:flex;align-items:center;gap:10px">'
          +'<span style="font-size:12px;color:var(--muted);min-width:120px">Leituras/dia</span>'
          +fmtBar(pctReads,'#854d0e')
          +fmtPct(pctReads)
          +'<span style="font-size:11px;color:var(--muted)">~'+estReads+' / 50.000</span>'
          +'</div>'
          +'</div>';

        // Projection
        html+='<div style="background:var(--surface2);border-radius:var(--r);padding:1rem">'
          +'<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:.75rem">Projeção de crescimento</div>'
          +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';

        var anos=[1,2,3,5,10];
        for(var ai=0;ai<anos.length;ai++){
          var a=anos[ai];
          var pFut=totalAll+(procsPerYear*a);
          var mFut=(pFut*KB_PER_PROC)/1024;
          var pFutPct=Math.min((mFut/LIMIT_STORAGE_MB)*100,100);
          html+='<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px dotted var(--border)">'
            +'<span style="font-size:12px;color:var(--muted)">Daqui '+a+(a===1?' ano':' anos')+'</span>'
            +'<span style="font-size:12px;font-family:var(--mono)">'
            +'<span style="color:#1a3a5c;font-weight:600">'+pFut.toLocaleString("pt-BR")+'</span>'
            +' prot. | <span style="color:#166534">'+mFut.toFixed(1)+'MB</span>'
            +' <span style="font-size:10px;color:var(--muted)">('+pFutPct.toFixed(1)+'%)</span>'
            +'</span>'
            +'</div>';
        }
        html+='</div>'
          +'<div style="margin-top:.75rem;font-size:11px;color:var(--muted)">* Baseado no ritmo atual de '+procsPerDay+' protocolos/dia. Estimativa de 5KB por protocolo.</div>'
          +'</div>';

        html+='<div style="text-align:right;margin-top:.5rem">'
          +'<span style="font-size:11px;color:var(--muted)">Atualizado em: '+new Date().toLocaleString("pt-BR")+'</span>'
          +'</div>';

        el.innerHTML=html;
      });
    });
  }).catch(function(){
    var el2=document.getElementById("firebaseUsage");
    if(el2)el2.innerHTML='<div style="font-size:12px;color:var(--muted)">Nao foi possivel carregar dados de uso.</div>';
  });
}


// =============================================
// VERSION CHECK / UPDATE NOTIFICATION
// =============================================
var APP_VERSION = "1780422002";

function checkVersion(){
  db.collection("config").doc("app_version").get().then(function(s){
    if(!s.exists){
      // First time - save current version
      db.collection("config").doc("app_version").set({
        version: APP_VERSION,
        updatedAt: new Date().toISOString(),
        msg: ""
      });
      return;
    }
    var remoteVersion=s.data().version||"";
    var remoteMsg=s.data().msg||"Nova versao disponivel. Atualize para usar as ultimas melhorias.";
    if(remoteVersion && remoteVersion !== APP_VERSION){
      showUpdateBanner(remoteMsg);
    }
  }).catch(function(){});
}
function startVersionCheck(){
  checkVersion();
  setInterval(checkVersion, 5*60*1000);
}

function publishUpdate(msg){
  var version=new Date().getTime().toString();
  return db.collection("config").doc("app_version").set({
    version: version,
    updatedAt: new Date().toISOString(),
    msg: msg||"Nova versao disponivel. Atualize a pagina para continuar."
  });
}

function showUpdateBanner(msg){
  // Remove existing banner if any
  var existing=document.getElementById("updateBanner");
  if(existing)existing.remove();

  var banner=document.createElement("div");
  banner.id="updateBanner";
  banner.style.cssText=[
    "position:fixed","top:0","left:0","right:0","z-index:99999",
    "background:#1a3a5c","color:#fff",
    "padding:10px 16px",
    "display:flex","align-items:center","gap:12px",
    "font-family:IBM Plex Sans,sans-serif","font-size:13px",
    "box-shadow:0 2px 12px rgba(0,0,0,.3)"
  ].join(";");

  banner.innerHTML=
    '<i class="ti ti-refresh" style="font-size:18px;flex-shrink:0"></i>'
    +'<span style="flex:1"><strong>Nova versao disponivel!</strong> '+msg+'</span>'
    +'<button onclick="window.location.reload(true)" style="background:#fff;color:#1a3a5c;border:none;border-radius:6px;padding:6px 16px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0">Atualizar agora</button>'
    +'<button id="bDismissBanner" style="background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:18px;padding:0 4px;flex-shrink:0">&#x2715;</button>';

  document.body.appendChild(banner);
  var app=document.getElementById('app');
  if(app)app.style.paddingTop='48px';
  var db2=document.getElementById('bDismissBanner');
  if(db2)db2.onclick=function(){
    banner.remove();
    var a2=document.getElementById('app');
    if(a2)a2.style.paddingTop='';
  };
}


// =============================================
// ORCAMENTO DO PROTOCOLO (ABA)
// =============================================
function tOrcamentoProc(p){
  var nat=p.natureza||'cv_urbano';
  var imoveis=p.imoveis||(p.valor?[{mat:'',val:p.valor}]:[]);
  imoveis=imoveis.map(function(im){return typeof im==="string"?{mat:'',val:im}:im;});
  var orcP=p.orcamentoProc||{};
  var notasItens=orcP.notasItens||[];
  var regItens=orcP.regItens||[];
  var entrada=orcP.entrada||0;

  // Build default items if none saved yet
  // Get plNat from PLABELS or A.nats (nats is more reliable - loaded first)
  var plNatCheck={};
  if(A.nats){for(var nci=0;nci<A.nats.length;nci++){if(A.nats[nci].key===nat){plNatCheck={codN:A.nats[nci].codN||'',codR:A.nats[nci].codR||''};break;}}}
  if(PLABELS[nat])Object.assign(plNatCheck,PLABELS[nat]);
  var plNat=plNatCheck; // alias for compatibility
  if(!notasItens.length&&(imoveis.length||plNatCheck.codN)){
    // Check custom codes from PLABELS first
    var plNat=plNatCheck;
    var faixaMin=568,faixaMax=618;
    if(nat==="inventario_capazes"||nat==="inventario_incapaz"||nat==="divorcio"){faixaMin=619;faixaMax=669;}
    if(nat==="distrato"){faixaMin=704;faixaMax=754;}
    var notasFaixa;
    if(plNat.codN){
      notasFaixa=parseCodFaixa(plNat.codN,TABELA_NOTAS);
    } else {
      notasFaixa=TABELA_NOTAS.filter(function(a){return a.cod>=faixaMin&&a.cod<=faixaMax;});
    }
    var regFaixa;
    if(plNat.codR){
      regFaixa=parseCodFaixa(plNat.codR,TABELA_REG);
    } else {
      regFaixa=TABELA_REG.filter(function(a){return a.cod>=157&&a.cod<=207;});
    }
    if(plNat.codN&&notasFaixa.length){
      // Custom nat: add matched notas directly (no imovel value needed)
      for(var ni2=0;ni2<notasFaixa.length;ni2++){
        var na2=notasFaixa[ni2];
        notasItens.push({cod:na2.cod,qtd:1,desc:na2.desc,emolBase:na2.emol,issqnBase:na2.issqn,seloBase:na2.selo,val:na2.total,acrescimo:0,removivel:true});
      }
    } else {
      for(var ii=0;ii<imoveis.length;ii++){
        var lbl=imoveis.length>1?" (Imovel "+(ii+1)+")"+(imoveis[ii].mat?' - Mat.'+imoveis[ii].mat:''):"";
        var ato=findByValueNew(notasFaixa,imoveis[ii].val||imoveis[ii]);
        if(ato)notasItens.push({cod:ato.cod,qtd:1,desc:"ESCR COM VALOR DECL - "+ato.desc+lbl,emolBase:ato.emol,issqnBase:ato.issqn,seloBase:ato.selo,val:ato.total,acrescimo:0,removivel:true});
        var regAto=findByValueNew(regFaixa,imoveis[ii].val||imoveis[ii]);
        if(regAto)regItens.push({cod:regAto.cod,qtd:1,desc:"Reg. Geral c/ valor decl., de "+regAto.desc+lbl,emolBase:regAto.emol,issqnBase:regAto.issqn,seloBase:regAto.selo,val:regAto.total,acrescimo:0,removivel:true});
      }
    }
    if(plNat.codR&&regFaixa.length){
      for(var ri3=0;ri3<regFaixa.length;ri3++){
        var ra2=regFaixa[ri3];
        if(!regItens.some||!regItens.some(function(x){return x.cod===ra2.cod;})){
          regItens.push({cod:ra2.cod,qtd:1,desc:ra2.desc,emolBase:ra2.emol,issqnBase:ra2.issqn,seloBase:ra2.selo,val:ra2.total,acrescimo:0,removivel:true});
        }
      }
    }
    var a154=getAtoByCode(154,TABELA_REG);
    var a340=getAtoByCode(340,TABELA_REG);
    var a456=getAtoByCode(456,TABELA_REG);
    var a453=getAtoByCode(453,TABELA_REG);
    if(a154)regItens.unshift({cod:154,qtd:1,desc:a154.desc,emolBase:a154.emol,issqnBase:a154.issqn,seloBase:a154.selo,val:a154.total,acrescimo:0,removivel:true});
    if(a340)regItens.push({cod:340,qtd:1,desc:a340.desc,emolBase:a340.emol,issqnBase:a340.issqn,seloBase:a340.selo,val:a340.total,acrescimo:0,removivel:true});
    if(a456)regItens.push({cod:456,qtd:1,desc:a456.desc,emolBase:a456.emol,issqnBase:a456.issqn,seloBase:a456.selo,val:a456.total,acrescimo:0,removivel:true});
    if(a453)regItens.push({cod:453,qtd:1,desc:a453.desc,emolBase:a453.emol,issqnBase:a453.issqn,seloBase:a453.selo,val:a453.total,acrescimo:0,removivel:true});
    // Save defaults back to process state
    if(!p.orcamentoProc)p.orcamentoProc={};
    p.orcamentoProc.notasItens=notasItens;
    p.orcamentoProc.regItens=regItens;
  }

  var subtN=0;for(var i=0;i<notasItens.length;i++)subtN+=notasItens[i].qtd*calcItemVal(notasItens[i]);
  var subtR=0;for(var i=0;i<regItens.length;i++)subtR+=regItens[i].qtd*calcItemVal(regItens[i]);
  var total=subtN+subtR;
  var saldo=total-entrada;

  if(!imoveis.length&&!plNatCheck.codN){
    return '<div style="padding:1.5rem;text-align:center;color:var(--muted)"><i class="ti ti-info-circle" style="font-size:24px"></i><br>Nenhum valor de imovel cadastrado neste protocolo.</div>';
  }

  // Avulso dropdowns
  var avOptsN='<option value="">-- Adicionar ato de Notas --</option>';
  for(var i=0;i<TABELA_NOTAS.length;i++){var tav=TABELA_NOTAS[i];avOptsN+='<option value="'+tav.cod+'">'+tav.cod+' - '+ex(tav.desc)+' ('+fmtBRL(tav.total)+')</option>';}
  var avOptsR='<option value="">-- Adicionar ato de Registro --</option>';
  for(var i=0;i<TABELA_REG.length;i++){var trv=TABELA_REG[i];avOptsR+='<option value="'+trv.cod+'">'+trv.cod+' - '+ex(trv.desc)+' ('+fmtBRL(trv.total)+')</option>';}

  function row(it, idx, tipo){
    var val=calcItemVal(it);
    var acr=it.acrescimo||0;
    return '<tr>'

function bindOrcamentoProc(p){
  if(!p.orcamentoProc)p.orcamentoProc={};
  var orcP=p.orcamentoProc;
  var notasItens=orcP.notasItens||[];
  var regItens=orcP.regItens||[];

  // Toggle custom cliente field
  var cSelEl=document.getElementById('orcProcCliente');
  var cCusWrap=document.getElementById('orcProcClienteCustomWrap');
  if(cSelEl)cSelEl.onchange=function(){
    if(cCusWrap)cCusWrap.style.display=cSelEl.value==='__outro__'?'flex':'none';
  };

  function rerender(){
    orcP.notasItens=notasItens;
    orcP.regItens=regItens;
    p.orcamentoProc=orcP;
    var ovEl=document.getElementById('mOv');
    if(ovEl){A.tab="orcamento_proc";ovEl.innerHTML=gMH();bindModal();}
  }

  function recalcTotals(){
    var modalEl2=document.getElementById('mOv')||document;
    var subtN=0;
    for(var i=0;i<notasItens.length;i++){
      var vn=notasItens[i].qtd*calcItemVal(notasItens[i]);
      subtN+=vn;
      var tnEl=modalEl2.querySelector('[data-row-total="n-'+i+'"]');
      if(tnEl)tnEl.textContent=fmtBRL(vn);
    }
    var subtR=0;
    for(var i=0;i<regItens.length;i++){
      var vr=regItens[i].qtd*calcItemVal(regItens[i]);
      subtR+=vr;
      var trEl=modalEl2.querySelector('[data-row-total="r-'+i+'"]');
      if(trEl)trEl.textContent=fmtBRL(vr);
    }
    var total=subtN+subtR;
    var ent=parseFloat(document.getElementById('opEntrada')?document.getElementById('opEntrada').value:0)||0;
    orcP.entrada=ent;
    var saldo=total-ent;
    // Update subtotals
    var sbtN=modalEl2.querySelector('#opSubtN');if(sbtN)sbtN.textContent=fmtBRL(subtN);
    var sbtR=modalEl2.querySelector('#opSubtR');if(sbtR)sbtR.textContent=fmtBRL(subtR);
    var tb=modalEl2.querySelector('#opTotalBar');
    if(tb){
      tb.style.background=saldo<=0?'#166534':'#991b1b';
      var lbl=saldo<=0?'&#10003; QUITADO':'TOTAL A PAGAR';
      var info=ent>0?' <span style="font-size:11px;opacity:.8;margin-left:10px">(Total: '+fmtBRL(total)+' | Entrada: '+fmtBRL(ent)+')</span>':'';
      tb.innerHTML=lbl+': <span style="font-family:var(--mono)">'+fmtBRL(Math.abs(saldo))+'</span>'+info;
    }
  }

  // Qtd changes
  // Scope to modal to avoid conflicts with rOrcamentos
  var modalEl=document.getElementById('mOv')||document;
  modalEl.querySelectorAll('[data-op-qtd]').forEach(function(inp){
    function handleQtdChange(){
      var tipo=inp.dataset.opQtd,idx2=parseInt(inp.dataset.opIdx),qtd=parseInt(inp.value)||1;
      if(tipo==='n'){
        if(!notasItens[idx2])return;
        notasItens[idx2].qtd=qtd;
      } else {
        if(!regItens[idx2])return;
        regItens[idx2].qtd=qtd;
      }
      recalcTotals();
    }
    inp.oninput=handleQtdChange;
    inp.onchange=handleQtdChange;
  });

  // Acrescimo
  modalEl.querySelectorAll('[data-op-acr]').forEach(function(btn){
    btn.onclick=function(){
      var tipo=btn.dataset.opAcr,idx=parseInt(btn.dataset.opIdx),pct=parseInt(btn.dataset.pct);
      var arr=tipo==='n'?notasItens:regItens;
      arr[idx].acrescimo=arr[idx].acrescimo===pct?0:pct;
      arr[idx].val=calcItemVal(arr[idx]);
      rerender();
    };
  });

  // Remove
  modalEl.querySelectorAll('[data-op-rem]').forEach(function(btn){
    btn.onclick=function(){
      var tipo=btn.dataset.opRem,idx=parseInt(btn.dataset.opIdx);
      if(tipo==='n')notasItens.splice(idx,1);
      else regItens.splice(idx,1);
      rerender();
    };
  });

  // Add avulso notas
  var bAddN=document.getElementById('bOpAddNotasAv');
  if(bAddN)bAddN.onclick=function(){
    var sel=document.getElementById('selOpNotasAv');
    var qtd=parseInt(document.getElementById('qtdOpNotasAv').value)||1;
    if(!sel||!sel.value)return;
    var av=getAtoByCode(parseInt(sel.value),TABELA_NOTAS);
    if(!av)return;
    notasItens.push({cod:av.cod,qtd:qtd,desc:av.desc,emolBase:av.emol,issqnBase:av.issqn,seloBase:av.selo,val:av.total,acrescimo:0,removivel:true});
    rerender();
  };

  // Add avulso reg
  var bAddR=document.getElementById('bOpAddRegAv');
  if(bAddR)bAddR.onclick=function(){
    var sel=document.getElementById('selOpRegAv');
    var qtd=parseInt(document.getElementById('qtdOpRegAv').value)||1;
    if(!sel||!sel.value)return;
    var av=getAtoByCode(parseInt(sel.value),TABELA_REG);
    if(!av)return;
    regItens.push({cod:av.cod,qtd:qtd,desc:av.desc,emolBase:av.emol,issqnBase:av.issqn,seloBase:av.selo,val:av.total,acrescimo:0,removivel:true});
    rerender();
  };

  // Entrada input
  var entEl=document.getElementById('opEntrada');
  if(entEl)entEl.oninput=function(){orcP.entrada=parseFloat(entEl.value)||0;recalcTotals();};

  // Save
  var bSv=document.getElementById('bSvOrcProc');
  if(bSv)bSv.onclick=function(){
    orcP.notasItens=notasItens;
    orcP.regItens=regItens;
    orcP.entrada=parseFloat(document.getElementById('opEntrada')?document.getElementById('opEntrada').value:0)||0;
    // Save cliente
    var cSel2=document.getElementById('orcProcCliente');
    var cCus2=document.getElementById('orcProcClienteCustom');
    if(cSel2&&cSel2.value&&cSel2.value!=='__outro__')orcP.cliente=cSel2.value;
    else if(cCus2&&cCus2.value.trim())orcP.cliente=cCus2.value.trim();
    p.orcamentoProc=orcP;
    bSv.disabled=true;
    ssy(true);
    db.collection('processes').doc(p.id).update({orcamentoProc:orcP},{merge:true}).then(function(){
      ssy(false);bSv.disabled=false;toast('Orcamento salvo!');
    });
  };

  // Print
  function doPrintOrcProc(){
    var clienteSel=document.getElementById('orcProcCliente');
    var clienteCustom=document.getElementById('orcProcClienteCustom');
    var cliente=clienteSel&&clienteSel.value&&clienteSel.value!=='__outro__'
      ?clienteSel.value
      :(clienteCustom&&clienteCustom.value.trim()?clienteCustom.value.trim():'');
    var subtN=0;for(var i=0;i<notasItens.length;i++)subtN+=notasItens[i].qtd*calcItemVal(notasItens[i]);
    var subtR=0;for(var i=0;i<regItens.length;i++)subtR+=regItens[i].qtd*calcItemVal(regItens[i]);
    var ent=orcP.entrada||0;
    var imoveis=p.imoveis||(p.valor?[p.valor]:[]);
    var natLabel=gn(p.natureza).label;
    return printOrcamento(cliente,A.user?A.user.name:'',imoveis,natLabel,notasItens,regItens,subtN,subtR,ent);
  }

  var bPrint=document.getElementById('bPrintOrcProc');
  if(bPrint)bPrint.onclick=function(){var pw=doPrintOrcProc();setTimeout(function(){pw.print();},600);};
  var bPdf=document.getElementById('bPdfOrcProc');
  if(bPdf)bPdf.onclick=function(){var pw=doPrintOrcProc();setTimeout(function(){pw.print();pw.close();},600);};
}


function saveFormState(){
  if(!A.modal||A.modal!=="novo")return;
  var ov2=document.querySelector(".modal-overlay");
  if(!ov2)return;
  function g(id){var e=ov2.querySelector("#"+id);return e?e.value:null;}
  function gChk(id){var e=ov2.querySelector("#"+id);return e?e.checked:false;}
  if(g("fPr")!==null)A._fPr=g("fPr");
  if(g("fNa")!==null)A.fnat2=g("fNa");
  if(g("fDa")!==null)A._fDa=g("fDa");
  if(g("fDs")!==null)A._fDs=g("fDs");
  if(g("fMa")!==null)A._fMa=g("fMa");
  if(g("fRe")!==null)A._fRe=g("fRe");
  var reDrop=ov2.querySelector("#fReDrop");
  if(reDrop&&reDrop.value)A._fReDropVal=reDrop.value;
  if(g("fVl")!==null)A._fVl=g("fVl");
  if(g("fPgInfo")!==null)A._fPgInfo=g("fPgInfo");
  A._fPago=gChk("fPago");
  // Save all imoveis
  var imovValEls=ov2.querySelectorAll(".fVl-imovel");
  var imovMatEls=ov2.querySelectorAll(".fVl-mat");
  if(imovValEls.length){
    var curIm=[];
    imovValEls.forEach(function(e,ii){
      var matEl=imovMatEls[ii];
      curIm.push({mat:matEl?matEl.value:'',val:e.value});
    });
    A._fImoveis=curIm;
  }
  // Save all partes
  var groups=glGroups(A.fnat2||"cv_urbano");
  for(var gi=0;gi<groups.length;gi++){
    var saved=colP("fp"+gi,A.fpartes[gi]||[]);
    if(saved.length)A.fpartes[gi]=saved;
  }
}


function rebuildModal(){
  var ov=document.getElementById('mOv');
  if(!ov)return;
  var mb=ov.querySelector('.modal-body');
  var scrollTop=mb?mb.scrollTop:0;
  ov.innerHTML=gMH();
  bindModal();
  bindMoneyInputs(ov);
  var mb2=ov.querySelector('.modal-body');
  if(mb2&&scrollTop>0)mb2.scrollTop=scrollTop;
}

function rMeusProcessos(){
  var isSup=A.user&&A.user.role==="supervisor";
  var uid=A.user?A.user.id:"";
  var selUser=A.mpFiltroUser||"";

  // Filter processes
  var procs=A.processes||[];
  if(isSup){
    if(selUser)procs=procs.filter(function(p){return p.createdBy===selUser;});
  } else {
    procs=procs.filter(function(p){
      if(p.createdBy!==uid)return false;
      var hf=p.hiddenFor||[];
      return hf.indexOf(uid)<0;
    });
  }

  // Sort by createdAt desc
  procs=procs.slice().sort(function(a,b){return (b.createdAt||"")>(a.createdAt||"")?1:-1;});

  // Status filter
  var selSt=A.mpFiltroSt||"";
  if(selSt)procs=procs.filter(function(p){return (p.status||"cadastrado")===selSt;});

  var h='<div class="page-header"><div>'
    +'<div class="page-title"><i class="ti ti-user-check" style="margin-right:.5rem"></i>Meus Processos</div>'
    +'<div class="page-subtitle">'+procs.length+' protocolo(s) encontrado(s)</div>'
    +'</div></div>';

  // Filters bar
  h+='<div class="filters" style="margin-bottom:1rem;display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">';

  // User filter (supervisor only)
  if(isSup){
    var users=A.users||[];
    var uOpts='<option value="">Todos os usuarios</option>';
    for(var ui=0;ui<users.length;ui++){
      uOpts+='<option value="'+users[ui].id+'"'+(selUser===users[ui].id?' selected':'')+'>'+ex(users[ui].name||users[ui].email)+'</option>';
    }

function bindMeusProcessos(){
  // Pagination
  document.querySelectorAll('[data-mp-pg]').forEach(function(btn){
    btn.onclick=function(){A.mpPage=parseInt(btn.dataset.mpPg);render();};
  });
  var bMpP=document.getElementById('bMpPrev');
  if(bMpP)bMpP.onclick=function(){if((A.mpPage||1)>1){A.mpPage--;render();}};
  var bMpN=document.getElementById('bMpNext');
  if(bMpN)bMpN.onclick=function(){A.mpPage=(A.mpPage||1)+1;render();};
  // Row click -> open protocol
  var rows=document.querySelectorAll('.proc-mp-row');
  for(var i=0;i<rows.length;i++)(function(row){
    row.onclick=function(){
      var pid=row.dataset.pid;
      for(var j=0;j<A.processes.length;j++){
        if(A.processes[j].id===pid){A.sel=A.processes[j];break;}
      }
      A.tab="dados";A.modal="ver";renderModal();
    };
  })(rows[i]);

  // Supervisor user filter
  var ufEl=document.getElementById("mpFiltroUser");
  if(ufEl)ufEl.onchange=function(){A.mpFiltroUser=ufEl.value;A.mpPage=1;render();};

  // Status filter
  var sfEl=document.getElementById("mpFiltroSt");
  if(sfEl)sfEl.onchange=function(){A.mpFiltroSt=sfEl.value;A.mpPage=1;render();};

  // Clear filters
  var bClr=document.getElementById("bMpClear");
  if(bClr)bClr.onclick=function(){A.mpFiltroUser="";A.mpFiltroSt="";A.mpPage=1;render();};
  // Delete from my list (only status=registro)
  var delBtns=document.querySelectorAll('[data-mp-del]');
  for(var di=0;di<delBtns.length;di++)(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var pid=btn.dataset.mpDel;
      var proc=null;
      for(var j=0;j<A.processes.length;j++)if(A.processes[j].id===pid){proc=A.processes[j];break;}
      var pnum=proc?proc.protocol:pid;
      if(!confirm('Remover protocolo '+pnum+' da sua lista? O processo continua no sistema.'))return;
      // Add current user to hiddenFor array
      var hiddenFor=proc.hiddenFor||[];
      if(hiddenFor.indexOf(A.user.id)<0)hiddenFor.push(A.user.id);
      ssy(true);
      db.collection('processes').doc(pid).update({hiddenFor:hiddenFor}).then(function(){
        ssy(false);toast('Protocolo removido da sua lista.');
        // Update local processes
        for(var j=0;j<A.processes.length;j++)if(A.processes[j].id===pid){A.processes[j].hiddenFor=hiddenFor;break;}
        render();
      });
    };
  })(delBtns[di]);
}

      +'<i class="ti ti-video-off" style="font-size:48px;display:block;margin-bottom:1rem"></i>'
      +'<div style="font-size:15px">Nenhuma videoconferencia encontrada.</div>'
      +'</div>';
    return h;
  }

  // Group by video user
  var byUser={};
  for(var fi=0;fi<filtered.length;fi++){
    var v=filtered[fi];
    if(!byUser[v.videoUser])byUser[v.videoUser]=[];
    byUser[v.videoUser].push(v);
  }

  var vuKeys=Object.keys(byUser).sort();
  for(var vki=0;vki<vuKeys.length;vki++){
    var vu=vuKeys[vki];
    var vuList=byUser[vu];
    h+='<div class="card" style="padding:0;overflow:hidden;margin-bottom:1rem">'
      +'<div style="background:var(--accent);color:#fff;padding:8px 14px;font-weight:700;font-size:13px;display:flex;align-items:center;gap:.5rem">'
      +'<i class="ti ti-user-circle"></i> '+ex(vu)
      +'<span style="background:rgba(255,255,255,.2);border-radius:10px;padding:1px 8px;font-size:11px">'+vuList.length+' agendamento(s)</span>'
      +'</div>'
      +'<table style="width:100%;border-collapse:collapse"><thead>'
      +'<tr style="background:var(--surface2)">'
      +'<th style="padding:8px 12px;font-size:11px">DATA/HORA</th>'
      +'<th style="padding:8px 12px;font-size:11px">SOLICITANTE</th>'
      +'<th style="padding:8px 12px;font-size:11px">PROTOCOLO</th>'
      +'<th style="padding:8px 12px;font-size:11px">OBSERVACAO</th>'
      +'<th style="padding:8px 12px;font-size:11px">STATUS</th>'
      +'<th style="padding:8px 12px;font-size:11px;width:120px"></th>'
      +'</tr></thead><tbody>';

    // Sort by date
    vuList.sort(function(a,b){return (a.data+a.hora)<(b.data+b.hora)?-1:1;});

    for(var vi3=0;vi3<vuList.length;vi3++){
      var v=vuList[vi3];
      var st=VIDEO_STATUS[v.status]||VIDEO_STATUS.pendente;
      var dtFmt=v.data?fd(v.data)+' '+v.hora:'-';
      var vuMatchC=uname&&(v.videoUser===uname||uname.indexOf(v.videoUser)>=0||v.videoUser.indexOf(uname.split(" ")[0])>=0);
      var canConcluir=isVid&&vuMatchC&&v.status==="confirmado";
      var canCancelar=v.status==="pendente"||v.status==="confirmado";
      h+='<tr style="border-bottom:1px solid var(--border)">'
        +'<td style="padding:8px 12px;font-size:12px;font-family:var(--mono)">'+dtFmt+'</td>'
        +'<td style="padding:8px 12px;font-size:12px">'+ex(v.solicitanteNome||'-')+'</td>'
        +'<td style="padding:8px 12px;font-size:12px;font-family:var(--mono)">'+ex(v.protocolo||'-')+'</td>'
        +'<td style="padding:8px 12px;font-size:12px;color:var(--muted)">'+ex(v.obs||'-')+'</td>'
        +'<td style="padding:8px 12px">'
        +'<span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:'+st.bg+';color:'+st.color+'">'+st.label+'</span>'
        +(v.obsConc?'<div style="font-size:10px;color:var(--muted);margin-top:2px">'+ex(v.obsConc)+'</div>':'')
        +'</td>'
        +'<td style="padding:6px 8px">'
        +'<div style="display:flex;gap:4px;flex-wrap:wrap">'
        +(canConcluir?'<button class="btn btn-primary btn-sm" style="font-size:10px;padding:2px 6px" data-vc-concluir="'+v.id+'"><i class="ti ti-check"></i> Concluir</button>':'')
        +(canCancelar?'<button class="btn btn-secondary btn-sm" style="font-size:10px;padding:2px 6px" data-vc-cancelar="'+v.id+'"><i class="ti ti-ban"></i></button>':'')
        +(isSup?'<button class="btn btn-danger btn-sm" style="font-size:10px;padding:2px 6px" data-vc-excluir="'+v.id+'" title="Excluir"><i class="ti ti-trash"></i></button>':'')
        +'</div>'
        +'</td>'
        +'</tr>';
    }
    h+='</tbody></table></div>';
  }

  // Video users management (supervisor only)
  if(isSup){
    var vu_list=getVideoUsers();
    h+='<div class="card" style="margin-top:1.5rem">';
    h+='<div class="card-header"><div class="card-title"><i class="ti ti-video"></i> Usuarios habilitados para Video</div></div>';
    h+='<div style="font-size:13px;color:var(--muted);margin-bottom:.75rem">Usuarios que podem receber agendamentos de videoconferencia.</div>';
    h+='<div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">';
    for(var vui=0;vui<vu_list.length;vui++){
      h+='<div style="display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:4px 10px">';
      h+='<i class="ti ti-video" style="font-size:12px;color:var(--accent)"></i>';
      h+='<span style="font-size:13px">'+ex(vu_list[vui])+'</span>';
      h+='<button class="btn btn-danger btn-sm" style="padding:1px 5px;font-size:10px" data-del-vidu="'+vui+'"><i class="ti ti-x"></i></button>';
      h+='</div>';
    }
    h+='</div>';
    h+='<div style="display:flex;gap:.5rem">';
    h+='<input type="text" id="novoVideoUser" placeholder="Nome do usuario (ex: Marcos)" style="flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px">';
    h+='<button class="btn btn-primary btn-sm" id="bAddVideoUser"><i class="ti ti-plus"></i> Habilitar</button>';
    h+='</div></div>';
  }

  return h;
}

function bindVideoconf(){
  if(!A.videoconfs)A.videoconfs=[];

  // Nova video button
  var bNova=document.getElementById("bNovaVideo");
  if(bNova)bNova.onclick=function(){
    A.vcForm={videoUser:"",data:"",hora:"",protocolo:"",obs:""};
    render();
  };

  // Cancel form
  var bCancel=document.getElementById("bCancelVideo");
  if(bCancel)bCancel.onclick=function(){A.vcForm=null;render();};

  // Save new videoconf
  var bSv=document.getElementById("bSvVideo");
  if(bSv)bSv.onclick=function(){
    var vu=document.getElementById("vcVidUser").value;
    var dt=document.getElementById("vcData").value;
    var hr=document.getElementById("vcHora").value;
    var prot=document.getElementById("vcProtocolo").value.trim();
    var obs=document.getElementById("vcObs").value.trim();
    if(!vu||!dt||!hr){toast("Preencha usuario, data e horario.","error");return;}
    bSv.disabled=true;ssy(true);
    db.collection("videoconfs").add({
      videoUser:vu,
      data:dt,hora:hr,
      protocolo:prot,obs:obs,
      solicitanteId:A.user.id,
      solicitanteNome:A.user.name||A.user.email,
      status:"pendente",
      createdAt:new Date().toISOString()
    }).then(function(){
      ssy(false);bSv.disabled=false;
      A.vcForm=null;
      toast("Solicitacao enviada! Aguardando aceite de "+vu+".");
      render();
    });
  };

  // Period toggle
  var bHoje=document.getElementById('bVcHoje');
  if(bHoje)bHoje.onclick=function(){A.vcPeriod='hoje';render();};
  var bSem=document.getElementById('bVcSemana');
  if(bSem)bSem.onclick=function(){A.vcPeriod='semana';render();};
  // Filters
  var fVU=document.getElementById("vcFiltroUser");
  if(fVU)fVU.onchange=function(){A.vcFiltroUser=fVU.value;render();};
  var fST=document.getElementById("vcFiltroSt");
  if(fST)fST.onchange=function(){A.vcFiltroSt=fST.value;render();};
  var bClr=document.getElementById("bVcClear");
  if(bClr)bClr.onclick=function(){A.vcFiltroUser="";A.vcFiltroSt="";render();};

  // Aceitar
  document.querySelectorAll("[data-vc-aceitar]").forEach(function(btn){
    btn.onclick=function(){
      ssy(true);
      db.collection("videoconfs").doc(btn.dataset.vcAceitar).update({
        status:"confirmado",aceitoEm:new Date().toISOString()
      }).then(function(){ssy(false);toast("Videoconferencia confirmada!");render();});
    };
  });

  // Recusar
  document.querySelectorAll("[data-vc-recusar]").forEach(function(btn){
    btn.onclick=function(){
      var motivo=prompt("Motivo da recusa (opcional):")||"";
      ssy(true);
      db.collection("videoconfs").doc(btn.dataset.vcRecusar).update({
        status:"recusado",motivoRecusa:motivo,recusadoEm:new Date().toISOString()
      }).then(function(){ssy(false);toast("Solicitacao recusada.");render();});
    };
  });

  // Concluir
  document.querySelectorAll("[data-vc-concluir]").forEach(function(btn){
    btn.onclick=function(){
      var obs=prompt("Observacao final (opcional):")||"Videoconferencia realizada com sucesso.";
      ssy(true);
      db.collection("videoconfs").doc(btn.dataset.vcConcluir).update({
        status:"concluido",obsConc:obs,concluidoEm:new Date().toISOString()
      }).then(function(){ssy(false);toast("Videoconferencia concluida!");render();});
    };
  });

  // Manage video users (supervisor)
  var bAddVU=document.getElementById('bAddVideoUser');
  if(bAddVU)bAddVU.onclick=function(){
    var inp=document.getElementById('novoVideoUser');
    var nome=inp?inp.value.trim():'';
    if(!nome){toast('Digite o nome do usuario.','error');return;}
    if(!A.videoUsers)A.videoUsers=VIDEO_USERS.slice();
    if(A.videoUsers.indexOf(nome)>=0){toast('Usuario ja habilitado.','error');return;}
    A.videoUsers.push(nome);
    ssy(true);
    saveVideoUsers().then(function(){ssy(false);toast(nome+' habilitado para video!');render();});
  };
  var delVUBtns=document.querySelectorAll('[data-del-vidu]');
  for(var dvi=0;dvi<delVUBtns.length;dvi++)(function(btn){
    btn.onclick=function(){
      var idx=parseInt(btn.dataset.delVidu);
      var nome=A.videoUsers[idx];
      if(!confirm('Remover '+nome+' dos usuarios de video?'))return;
      A.videoUsers.splice(idx,1);
      ssy(true);
      saveVideoUsers().then(function(){ssy(false);toast(nome+' removido.');render();});
    };
  })(delVUBtns[dvi]);
  // Excluir (supervisor only)
  document.querySelectorAll("[data-vc-excluir]").forEach(function(btn){
    btn.onclick=function(){
      if(!confirm("Excluir permanentemente este agendamento?"))return;
      ssy(true);
      db.collection("videoconfs").doc(btn.dataset.vcExcluir).delete().then(function(){
        ssy(false);toast("Agendamento excluido.");render();
      });
    };
  });
  // Cancelar
  document.querySelectorAll("[data-vc-cancelar]").forEach(function(btn){
    btn.onclick=function(){
      if(!confirm("Cancelar esta videoconferencia?"))return;
      ssy(true);
      db.collection("videoconfs").doc(btn.dataset.vcCancelar).update({
        status:"cancelado",canceladoEm:new Date().toISOString()
      }).then(function(){ssy(false);toast("Videoconferencia cancelada.");render();});
    };
  });
}


function loadVideoUsers(){
  if(A.videoUsers)return;
  db.collection("config").doc("video_users").get().then(function(s){
    if(s.exists&&s.data().lista&&s.data().lista.length){
      A.videoUsers=s.data().lista;
    } else {
      A.videoUsers=["Samuel","Igor","Anne","Deyse","Amilton"];
      db.collection("config").doc("video_users").set({lista:A.videoUsers});
    }
  }).catch(function(){A.videoUsers=["Samuel","Igor","Anne","Deyse","Amilton"];});
}

function saveVideoUsers(){
  return db.collection("config").doc("video_users").set({lista:A.videoUsers||[]});
}

function getVideoUsers(){
  return A.videoUsers||VIDEO_USERS;
}

// =============================================
var CERT_STATUS=[
  {key:"aguard_pgto",    label:"Aguardando Pgto.",           color:"#92400e",bg:"#fef3c7"},
  {key:"aguard_pgto_ad", label:"Aguardando Pgto - Adicional",color:"#78350f",bg:"#fde68a"},
  {key:"aguard_cartorio",label:"Aguardando Cartorio",        color:"#1d4ed8",bg:"#dbeafe"},
  {key:"processamento",  label:"Fase de Processamento",      color:"#6d28d9",bg:"#ede9fe"},
  {key:"prep_envio",     label:"Preparando Envio",           color:"#0f766e",bg:"#ccfbf1"},
  {key:"emitida",        label:"Certidao Emitida",           color:"#166534",bg:"#dcfce7"},
  {key:"em_confeccao",   label:"Em confeccao",               color:"#0369a1",bg:"#e0f2fe"},
  {key:"pago_carteira",  label:"Pago - Carteira",            color:"#166534",bg:"#bbf7d0"},
  {key:"rejeitado",      label:"Rejeitado",                  color:"#b45309",bg:"#ffedd5"},
  {key:"cancelado",      label:"Cancelado",                  color:"#991b1b",bg:"#fee2e2"}
];

function gCS(k){
  for(var i=0;i<CERT_STATUS.length;i++)if(CERT_STATUS[i].key===k)return CERT_STATUS[i];
  return CERT_STATUS[0];
}

function canEditCert(){
  if(!A.user)return false;
  if(A.user.role==="supervisor")return true;
  var el=A.certEditUsers||[];
  for(var i=0;i<el.length;i++)if(el[i]===A.user.id||el[i]===A.user.name)return true;
  return false;
}

function rCertidoes(){
  var isSup=A.user&&A.user.role==="supervisor";
  var canEdit=canEditCert();
  var certs=A.certidoes||[];

  // Filter
  var fSt=A.certFiltroSt||"";
  var fSol=A.certFiltroSol||"";
  var fQ=A.certSearch||"";
  var filtered=certs.filter(function(c){
    if(fSt&&(c.status||"aguard_pgto")!==fSt)return false;
    if(fSol&&c.solicitante!==fSol)return false;
    if(fQ){var q=fQ.toLowerCase();
      return (c.protocolo&&c.protocolo.toLowerCase().indexOf(q)>=0)
        ||(c.parte&&c.parte.toLowerCase().indexOf(q)>=0)
        ||(c.solicitante&&c.solicitante.toLowerCase().indexOf(q)>=0);}
    return true;
  });

  // Sort date desc
  filtered.sort(function(a,b){return (b.data||"")>(a.data||"")?1:(b.data||"")<(a.data||"")?-1:0;});

  // Unique solicitantes
  var solMap={};
  certs.forEach(function(c){if(c.solicitante)solMap[c.solicitante]=1;});
  var sols=Object.keys(solMap).sort();

  // Stats
  var stats={};
  CERT_STATUS.forEach(function(s){stats[s.key]=0;});
  certs.forEach(function(c){var k=c.status||"aguard_pgto";if(stats[k]!==undefined)stats[k]++;});

  var h='<div class="page-header"><div>'
    +'<div class="page-title"><i class="ti ti-certificate" style="margin-right:.5rem"></i>Pedidos de Certidoes</div>'
    +'<div class="page-subtitle">'+filtered.length+' de '+certs.length+' pedido(s)</div>'
    +'</div>'
    +(canEdit?'<button class="btn btn-primary" id="bNovaCert"><i class="ti ti-plus"></i> Novo Pedido</button>':'')
+(isSup?'<button class="btn btn-secondary" id="bDedup" onclick="dedupCertidoes()"><i class="ti ti-copy-off"></i> Remover Duplicatas</button>':'')
    +'</div>';

  // Status cards
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:1rem">';
  CERT_STATUS.forEach(function(st){
    if(!stats[st.key])return;
    h+='<div style="background:'+st.bg+';border-radius:var(--r);padding:8px 10px;cursor:pointer;border:2px solid '+(fSt===st.key?st.color:'transparent')+'" data-cert-sf="'+st.key+'">'
      +'<div style="font-size:20px;font-weight:700;color:'+st.color+'">'+stats[st.key]+'</div>'
      +'<div style="font-size:11px;color:'+st.color+';font-weight:600">'+st.label+'</div>'
      +'</div>';
  });
  h+='</div>';

  // Form
  if(A.certForm&&canEdit){
    var cf=A.certForm;
    h+='<div class="card" style="border:2px solid var(--accent);margin-bottom:1rem">'
      +'<div class="card-header"><div class="card-title">'+(cf.id?'Editar Pedido':'Novo Pedido')+'</div></div>'
      +'<div class="form-grid">'
      +'<div class="field"><label>Data *</label><input type="date" id="cfData" value="'+ex(cf.data||'')+'"></div>'
      +'<div class="field"><label>Protocolo *</label><input type="text" id="cfProt" value="'+ex(cf.protocolo||'')+'"></div>'
      +'<div class="field col-span-2"><label>Parte(s) *</label><input type="text" id="cfParte" value="'+ex(cf.parte||'')+'"></div>'
      +'<div class="field"><label>Solicitante *</label><input type="text" id="cfSolic" value="'+ex(cf.solicitante||'')+'"></div>'
      +'<div class="field"><label>Protocolo Opcional</label><input type="text" id="cfProtOp" value="'+ex(cf.protocolo_opcional||'')+'"></div>'
      +'<div class="field"><label>Status</label><select id="cfStatus">';
    CERT_STATUS.forEach(function(s){h+='<option value="'+s.key+'"'+(cf.status===s.key?' selected':'')+'>'+s.label+'</option>';});
    h+='</select></div>'
      +'<div class="field col-span-2"><label>Observacoes</label><input type="text" id="cfObs" value="'+ex(cf.obs||'')+'"></div>'
      +'</div>'
      +'<div style="display:flex;gap:.5rem;margin-top:.75rem">'
      +'<button class="btn btn-primary" id="bSvCert"><i class="ti ti-device-floppy"></i> Salvar</button>'
      +'<button class="btn btn-secondary" id="bCancelCert">Cancelar</button>'
      +'</div></div>';
  }

  // Filters
  h+='<div style="display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem;align-items:center">'
    +'<div class="search-box" style="flex:1;min-width:180px"><i class="ti ti-search"></i>'
    +'<input type="text" id="certSearch" placeholder="Buscar protocolo, parte..." value="'+ex(fQ)+'"></div>'
    +'<select class="filter-select" id="certFSt"><option value="">Todos os status</option>';
  CERT_STATUS.forEach(function(s){h+='<option value="'+s.key+'"'+(fSt===s.key?' selected':'')+'>'+s.label+'</option>';});
  h+='</select><select class="filter-select" id="certFSol"><option value="">Todos solicitantes</option>';
  sols.forEach(function(s){h+='<option value="'+ex(s)+'"'+(fSol===s?' selected':'')+'>'+ex(s)+'</option>';});
  h+='</select>';
  if(fSt||fSol||fQ)h+='<button class="btn btn-secondary btn-sm" id="bCertClr"><i class="ti ti-x"></i> Limpar</button>';
  h+='</div>';

  // Empty state
  if(!certs.length){
    h+='<div class="card" style="text-align:center;padding:3rem;color:var(--muted)">'
      +'<i class="ti ti-certificate" style="font-size:48px;display:block;margin-bottom:1rem"></i>'
      +'<div style="font-size:15px">Nenhum pedido cadastrado ainda.</div>'
      +'<div style="font-size:13px;margin-top:.5rem">Clique em "+ Novo Pedido" para comecar.</div>'
      +'</div>';
    return h;
  }
  if(!filtered.length){
    h+='<div class="card" style="text-align:center;padding:2rem;color:var(--muted)">Nenhum pedido encontrado com os filtros atuais.</div>';
    return h;
  }

  // Pagination
  var cPage=A.certPage||1;
  var cPer=50;
  var cTotal=Math.max(1,Math.ceil(filtered.length/cPer));
  if(cPage>cTotal)cPage=1;
  var cStart=(cPage-1)*cPer;
  var cRows=filtered.slice(cStart,cStart+cPer);

  if(cTotal>1){
    h+='<div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap">'
      +'<span style="font-size:12px;color:var(--muted)">Pag. '+cPage+'/'+cTotal+' ('+filtered.length+' registros)</span>'
      +'<div style="margin-left:auto;display:flex;gap:3px">';
    if(cPage>1)h+='<button class="btn btn-secondary btn-sm" data-cpg="'+(cPage-1)+'"><i class="ti ti-chevron-left"></i></button>';
    var ps=Math.max(1,cPage-2),pe=Math.min(cTotal,cPage+2);
    if(ps>1)h+='<button class="btn btn-secondary btn-sm" data-cpg="1">1</button>'+(ps>2?'<span style="padding:0 4px">...</span>':'');
    for(var pg=ps;pg<=pe;pg++)h+='<button class="btn btn-sm '+(pg===cPage?'btn-primary':'btn-secondary')+'" data-cpg="'+pg+'">'+pg+'</button>';
    if(pe<cTotal)h+=(pe<cTotal-1?'<span style="padding:0 4px">...</span>':'')+'<button class="btn btn-secondary btn-sm" data-cpg="'+cTotal+'">'+cTotal+'</button>';
    if(cPage<cTotal)h+='<button class="btn btn-secondary btn-sm" data-cpg="'+(cPage+1)+'"><i class="ti ti-chevron-right"></i></button>';
    h+='</div></div>';
  }

  // Table
  h+='<div class="card" style="padding:0;overflow:hidden">'
    +'<div style="overflow-x:auto;overflow-y:auto;max-height:calc(100vh - 300px)">'
    +'<table style="width:100%;border-collapse:collapse"><thead>'
    +'<tr style="background:var(--accent);color:#fff">';
  ["DATA","PROTOCOLO","PARTE","SOLICITANTE","PROT. OPC.","STATUS","OBSERVACOES"].forEach(function(h2,i){
    h+='<th style="padding:8px 10px;font-size:11px;text-align:left;position:sticky;top:0;background:var(--accent);z-index:2;white-space:nowrap">'+h2+'</th>';
  });
  if(canEdit)h+='<th style="width:70px;position:sticky;top:0;background:var(--accent);z-index:2"></th>';
  h+='</tr></thead><tbody>';

  cRows.forEach(function(c){
    var cst=gCS(c.status||"aguard_pgto");
    h+='<tr style="border-bottom:1px solid var(--border)">'
      +'<td style="padding:7px 10px;font-size:12px;font-family:var(--mono);white-space:nowrap">'+ex(c.data?fd(c.data):'-')+'</td>'
      +'<td style="padding:7px 10px;font-size:12px;font-family:var(--mono);font-weight:600;color:var(--accent)">'+ex(c.protocolo||'-')+'</td>'

function bindCertidoes(){
  var isSup=A.user&&A.user.role==="supervisor";

  // Pagination
  document.querySelectorAll('[data-cpg]').forEach(function(b){
    b.onclick=function(){A.certPage=parseInt(b.dataset.cpg);render();};
  });

  // Status card filter
  document.querySelectorAll('[data-cert-sf]').forEach(function(el){
    el.onclick=function(){A.certFiltroSt=A.certFiltroSt===el.dataset.certSf?'':el.dataset.certSf;A.certPage=1;render();};
  });

  // Search
  var srch=document.getElementById('certSearch');
  if(srch){srch.oninput=function(){A.certSearch=srch.value;};srch.onkeydown=function(e){if(e.key==='Enter'){A.certPage=1;render();}};}

  // Filters
  var fst=document.getElementById('certFSt');
  if(fst)fst.onchange=function(){A.certFiltroSt=fst.value;A.certPage=1;render();};
  var fsol=document.getElementById('certFSol');
  if(fsol)fsol.onchange=function(){A.certFiltroSol=fsol.value;A.certPage=1;render();};
  var bClr=document.getElementById('bCertClr');
  if(bClr)bClr.onclick=function(){A.certFiltroSt='';A.certFiltroSol='';A.certSearch='';A.certPage=1;render();};

  // New button
  var bN=document.getElementById('bNovaCert');
  if(bN)bN.onclick=function(){
    A.certForm={data:new Date().toISOString().split('T')[0],protocolo:'',parte:'',solicitante:'',protocolo_opcional:'',status:'aguard_pgto',obs:''};
    render();
  };

  // Cancel form
  var bC=document.getElementById('bCancelCert');
  if(bC)bC.onclick=function(){A.certForm=null;render();};

  // Save form
  var bS=document.getElementById('bSvCert');
  if(bS)bS.onclick=function(){
    var dt=document.getElementById('cfData').value;
    var prot=document.getElementById('cfProt').value.trim();
    var parte=document.getElementById('cfParte').value.trim();
    var solic=document.getElementById('cfSolic').value.trim();
    var protOp=document.getElementById('cfProtOp').value.trim();
    var status=document.getElementById('cfStatus').value;
    var obs=document.getElementById('cfObs').value.trim();
    if(!dt||!prot||!parte||!solic){toast('Preencha data, protocolo, parte e solicitante.','error');return;}
    bS.disabled=true;ssy(true);
    var data={data:dt,protocolo:prot,parte:parte,solicitante:solic,
      protocolo_opcional:protOp,status:status,obs:obs,
      updatedAt:new Date().toISOString(),updatedBy:A.user.id};
    var cf=A.certForm;
    var op=cf.id
      ?db.collection('certidoes').doc(cf.id).update(data)
      :db.collection('certidoes').add(Object.assign({},data,{createdAt:new Date().toISOString(),createdBy:A.user.id}));
    op.then(function(){
      ssy(false);bS.disabled=false;
      A.certForm=null;
      // Refresh list
      A.certidoes=null;
      loadCertidoes();
      toast(cf.id?'Atualizado!':'Pedido cadastrado!');
    }).catch(function(e){ssy(false);bS.disabled=false;toast('Erro: '+e.message,'error');});
  };

  // Inline status change
  document.querySelectorAll('.cert-st-sel').forEach(function(sel){
    sel.onchange=function(){
      var id=sel.dataset.cid;
      var nst=sel.value;
      var cst=gCS(nst);
      sel.style.background=cst.bg;sel.style.color=cst.color;sel.style.borderColor=cst.color;
      ssy(true);
      db.collection('certidoes').doc(id).update({status:nst,updatedAt:new Date().toISOString(),updatedBy:A.user.id})
        .then(function(){
          ssy(false);
          if(A.certidoes)A.certidoes.forEach(function(c){if(c.id===id)c.status=nst;});
        }).catch(function(e){ssy(false);toast('Erro: '+e.message,'error');});
    };
  });

  // Edit
  document.querySelectorAll('[data-cedit]').forEach(function(b){
    b.onclick=function(){
      var id=b.dataset.cedit;
      var c=(A.certidoes||[]).filter(function(x){return x.id===id;})[0];
      if(c)A.certForm=Object.assign({},c);
      render();
    };
  });

  // Delete
  document.querySelectorAll('[data-cdel]').forEach(function(b){
    b.onclick=function(){
      if(!confirm('Excluir este pedido?'))return;
      ssy(true);
      db.collection('certidoes').doc(b.dataset.cdel).delete()
        .then(function(){
          ssy(false);
          A.certidoes=(A.certidoes||[]).filter(function(c){return c.id!==b.dataset.cdel;});
          toast('Excluido.');render();
        }).catch(function(e){ssy(false);toast('Erro: '+e.message,'error');});
    };
  });

  // Add edit user
  var bACU=document.getElementById('bAddCU');
  if(bACU)bACU.onclick=function(){
    var sel=document.getElementById('selCU');
    if(!sel||!sel.value){toast('Selecione um usuario.','error');return;}
    if(!A.certEditUsers)A.certEditUsers=[];
    if(A.certEditUsers.indexOf(sel.value)>=0){toast('Ja habilitado.','error');return;}
    A.certEditUsers.push(sel.value);
    ssy(true);
    db.collection('config').doc('cert_edit_users').set({lista:A.certEditUsers})
      .then(function(){ssy(false);toast('Usuario habilitado!');render();});
  };

  // Remove edit user
  document.querySelectorAll('[data-dcu]').forEach(function(b){
    b.onclick=function(){
      var idx=parseInt(b.dataset.dcu);
      var nome=A.certEditUsers[idx];
      if(!confirm('Remover permissao de '+nome+'?'))return;
      A.certEditUsers.splice(idx,1);
      ssy(true);
      db.collection('config').doc('cert_edit_users').set({lista:A.certEditUsers})
        .then(function(){ssy(false);toast('Removido.');render();});
    };
  });
}

function loadCertidoes(){
  A.certidoes=[];
  db.collection("config").doc("cert_edit_users").get()
    .then(function(s){A.certEditUsers=s.exists?(s.data().lista||[]):[];})
    .catch(function(){A.certEditUsers=[];});
  db.collection("certidoes").get()
    .then(function(s){
      A.certidoes=s.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      A.certidoes.sort(function(a,b){return (b.data||"")>(a.data||"")?1:(b.data||"")<(a.data||"")?-1:0;});
      if(A.page==="certidoes")render();
    })
    .catch(function(e){
      console.error("certidoes load error:",e);
      A.certidoes=[];
      if(A.page==="certidoes")render();
    });
}

function dedupCertidoes(){
  var bDedup=document.getElementById('bDedup');
  if(bDedup){bDedup.disabled=true;bDedup.innerHTML='<i class="ti ti-loader"></i> Analisando...';}
  
  db.collection('certidoes').get().then(function(snap){
    var all=snap.docs.map(function(d){return {id:d.id,data:d.data()};});
    
    // Group by protocolo+parte (key to detect duplicates)
    var seen={};
    var toDelete=[];
    
    all.forEach(function(doc){
      var key=(doc.data.protocolo||'')+'|'+(doc.data.parte||'').toLowerCase().trim();
      if(!seen[key]){
        seen[key]=doc.id; // keep first
      } else {
        toDelete.push(doc.id); // mark duplicate for deletion
      }
    });
    
    if(toDelete.length===0){
      if(bDedup){bDedup.disabled=false;bDedup.innerHTML='<i class="ti ti-copy-off"></i> Remover Duplicatas';}
      toast('Nenhuma duplicata encontrada!');
      return;
    }
    
    if(!confirm('Encontradas '+toDelete.length+' duplicatas de '+all.length+' registros.\nDeseja excluir as duplicatas e manter apenas 1 de cada?')){
      if(bDedup){bDedup.disabled=false;bDedup.innerHTML='<i class="ti ti-copy-off"></i> Remover Duplicatas';}
      return;
    }
    
    // Delete in batches of 400
    var chunks=[];
    for(var i=0;i<toDelete.length;i+=400)chunks.push(toDelete.slice(i,i+400));
    var ci=0;
    
    function nextChunk(){
      if(ci>=chunks.length){
        if(bDedup){bDedup.disabled=false;bDedup.innerHTML='<i class="ti ti-copy-off"></i> Remover Duplicatas';}
        toast(toDelete.length+' duplicatas removidas! Recarregando...');
        A.certidoes=null;
        loadCertidoes();
        return;
      }
      var batch=db.batch();
      chunks[ci++].forEach(function(id){
        batch.delete(db.collection('certidoes').doc(id));
      });
      batch.commit().then(function(){setTimeout(nextChunk,300);})
        .catch(function(e){
          if(bDedup){bDedup.disabled=false;bDedup.innerHTML='<i class="ti ti-copy-off"></i> Remover Duplicatas';}
          toast('Erro: '+e.message,'error');
        });
    }
    nextChunk();
  }).catch(function(e){
    if(bDedup){bDedup.disabled=false;bDedup.innerHTML='<i class="ti ti-copy-off"></i> Remover Duplicatas';}
    toast('Erro ao carregar: '+e.message,'error');
  });
}

// Parse code range string like "568-618" or "671" or "671,679,685"
function parseCodFaixa(codStr, tabela){
  if(!codStr||!tabela)return [];
  var result=[];
  var parts=codStr.split(',');
  for(var pi=0;pi<parts.length;pi++){
    var part=parts[pi].trim();
    if(part.indexOf('-')>=0){
      var range=part.split('-');
      var mn=parseInt(range[0]),mx=parseInt(range[1]);
      if(!isNaN(mn)&&!isNaN(mx)){
        for(var ti=0;ti<tabela.length;ti++){
          if(tabela[ti].cod>=mn&&tabela[ti].cod<=mx)result.push(tabela[ti]);
        }
      }
    } else {
      var cod=parseInt(part);
      if(!isNaN(cod)){
        for(var ti2=0;ti2<tabela.length;ti2++){
          if(tabela[ti2].cod===cod){result.push(tabela[ti2]);break;}
        }
      }
    }
  }
  return result;
}

function fmtBRLCalc(v){
  if(isNaN(v)||v===null||v===undefined)return "—";
  return "R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2});
}
function parseBRL(s){
  if(!s)return NaN;
  return parseFloat(String(s).replace(/\./g,"").replace(",",".").replace(/[^0-9.-]/g,""));
}
function fmtNum(v,dec){
  if(isNaN(v))return "—";
  dec=dec!==undefined?dec:2;
  return Number(v).toLocaleString("pt-BR",{minimumFractionDigits:dec,maximumFractionDigits:dec});
}

function bindCalculadora(){
  var hist=A.calcHist||[];
  var haUnitVal=A.calcHaUnit||0;

  function addHist(descricao,resultado){
    if(!A.calcHist)A.calcHist=[];
    A.calcHist.unshift({d:descricao,r:resultado,t:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"})});
    if(A.calcHist.length>20)A.calcHist.pop();
    var hEl=document.getElementById("calcHistorico");
    if(hEl){
      hEl.innerHTML="";
      A.calcHist.forEach(function(h){
        hEl.innerHTML+='<div style="padding:4px 0;border-bottom:1px dotted var(--border)">'
          +'<div style="color:var(--text);font-weight:600">'+h.r+'</div>'
          +'<div style="color:var(--muted);font-size:11px">'+h.d+' <span style="float:right">'+h.t+'</span></div>'
          +'</div>';
      });
    }
  }

  // Restore historico
  var hEl=document.getElementById("calcHistorico");
  if(hEl&&hist.length){
    hEl.innerHTML="";
    hist.forEach(function(h){
      hEl.innerHTML+='<div style="padding:4px 0;border-bottom:1px dotted var(--border)">'
        +'<div style="color:var(--text);font-weight:600">'+h.r+'</div>'
        +'<div style="color:var(--muted);font-size:11px">'+h.d+' <span style="float:right">'+h.t+'</span></div>'
        +'</div>';
    });
  }

  // Limpar historico
  var bLH=document.getElementById("bLimparHist");
  if(bLH)bLH.onclick=function(){A.calcHist=[];var hEl2=document.getElementById("calcHistorico");if(hEl2)hEl2.innerHTML='<div style="text-align:center;padding:1rem;color:var(--muted)">Nenhum calculo ainda.</div>';};

  function showResult(id,txt,ok){
    var el=document.getElementById(id);
    if(el){el.innerHTML='<span style="color:'+(ok?"var(--accent)":"#dc2626")+'">'+txt+'</span>';}
  }

  // P1: X% de valor
  var bP1=document.getElementById("bCalcP1");
  if(bP1)bP1.onclick=function(){
    var pct=parseFloat(document.getElementById("pPct1").value.replace(",","."));
    var val=parseBRL(document.getElementById("pVal1").value);
    if(isNaN(pct)||isNaN(val)){showResult("rP1","Valores invalidos.",false);return;}
    var res=val*(pct/100);
    var txt=fmtNum(pct,2)+"% de "+fmtBRLCalc(val)+" = <strong>"+fmtBRLCalc(res)+"</strong>";
    showResult("rP1",txt,true);
    addHist(fmtNum(pct,2)+"% de "+fmtBRLCalc(val),fmtBRLCalc(res));
  };

  // P2: X eh N% de quanto?
  var bP2=document.getElementById("bCalcP2");
  if(bP2)bP2.onclick=function(){
    var val=parseBRL(document.getElementById("pVal2").value);
    var pct=parseFloat(document.getElementById("pPct2").value.replace(",","."));
    if(isNaN(val)||isNaN(pct)||pct===0){showResult("rP2","Valores invalidos.",false);return;}
    var res=val/(pct/100);
    var txt=fmtBRLCalc(val)+" eh "+fmtNum(pct,2)+"% de <strong>"+fmtBRLCalc(res)+"</strong>";
    showResult("rP2",txt,true);
    addHist(fmtBRLCalc(val)+" eh "+fmtNum(pct,2)+"% de?",fmtBRLCalc(res));
  };

  // P3: Qual % representa?
  var bP3=document.getElementById("bCalcP3");
  if(bP3)bP3.onclick=function(){
    var va=parseBRL(document.getElementById("pValA").value);
    var vb=parseBRL(document.getElementById("pValB").value);
    if(isNaN(va)||isNaN(vb)||vb===0){showResult("rP3","Valores invalidos.",false);return;}
    var res=(va/vb)*100;
    var txt=fmtBRLCalc(va)+" eh <strong>"+fmtNum(res,4)+"%</strong> de "+fmtBRLCalc(vb);
    showResult("rP3",txt,true);
    addHist(fmtBRLCalc(va)+" de "+fmtBRLCalc(vb),fmtNum(res,4)+"%");
  };

  // Hectares: calcular valor/ha
  var bHa=document.getElementById("bCalcHa");
  if(bHa)bHa.onclick=function(){
    var vt=parseBRL(document.getElementById("aValTotal").value);
    var ht=parseFloat(document.getElementById("aHaTotal").value.replace(",","."));
    if(isNaN(vt)||isNaN(ht)||ht===0){showResult("rHaUnit","Valores invalidos.",false);return;}
    haUnitVal=vt/ht;
    A.calcHaUnit=haUnitVal;
    var txt="Valor total: "+fmtBRLCalc(vt)+" | Area: "+fmtNum(ht,2)+" ha<br><strong>Valor por hectare: "+fmtBRLCalc(haUnitVal)+"</strong>";
    showResult("rHaUnit",txt,true);
    addHist(fmtBRLCalc(vt)+" / "+fmtNum(ht,2)+" ha","1 ha = "+fmtBRLCalc(haUnitVal));
  };

  // Hectares: simular
  var bHaSim=document.getElementById("bCalcHaSim");
  if(bHaSim)bHaSim.onclick=function(){
    var hs=parseFloat(document.getElementById("aHaSim").value.replace(",","."));
    if(isNaN(hs)){showResult("rHaSim","Informe a quantidade de hectares.",false);return;}
    var huv=A.calcHaUnit||haUnitVal;
    if(!huv){showResult("rHaSim","Calcule o valor/ha primeiro.",false);return;}
    var res=huv*hs;
    var txt=fmtNum(hs,2)+" ha x "+fmtBRLCalc(huv)+"/ha = <strong>"+fmtBRLCalc(res)+"</strong>";
    showResult("rHaSim",txt,true);
    addHist(fmtNum(hs,2)+" hectares",fmtBRLCalc(res));
  };

  // Converter area
  var bConv=document.getElementById("bCalcConv");
  if(bConv)bConv.onclick=function(){
    var v=parseFloat(document.getElementById("aConvVal").value.replace(",","."));
    var de=document.getElementById("aConvDe").value;
    var para=document.getElementById("aConvPara").value;
    if(isNaN(v)){showResult("rConv","Valor invalido.",false);return;}
    // Convert to m2 first
    var m2;
    if(de==="m2")m2=v;
    else if(de==="ha")m2=v*10000;
    else if(de==="alq")m2=v*24200; // alqueire paulista
    var res;
    if(para==="m2")res=m2;
    else if(para==="ha")res=m2/10000;
    else if(para==="alq")res=m2/24200;
    var unidade={"m2":"m²","ha":"hectares","alq":"alqueires"};
    var txt=fmtNum(v,4)+" "+unidade[de]+" = <strong>"+fmtNum(res,6)+" "+unidade[para]+"</strong>";
    showResult("rConv",txt,true);
    addHist(fmtNum(v,4)+" "+unidade[de]+" em "+unidade[para],fmtNum(res,6)+" "+unidade[para]);
  };

  // ITBI
  var bITBI=document.getElementById("bCalcITBI");
  if(bITBI)bITBI.onclick=function(){
    var val=parseBRL(document.getElementById("itbiVal").value);
    var pct=parseFloat(document.getElementById("itbiPct").value.replace(",","."));
    if(isNaN(val)||isNaN(pct)){showResult("rITBI","Valores invalidos.",false);return;}
    var imposto=val*(pct/100);
    var total=val+imposto;
    var txt='<div style="font-size:13px">'
      +'<div>Valor do imovel: <strong>'+fmtBRLCalc(val)+'</strong></div>'
      +'<div>ITBI ('+fmtNum(pct,2)+'%): <strong style="color:#dc2626">'+fmtBRLCalc(imposto)+'</strong></div>'
      +'<div style="margin-top:4px;font-size:14px">Total com ITBI: <strong style="color:var(--accent)">'+fmtBRLCalc(total)+'</strong></div>'
      +'</div>';
    showResult("rITBI",txt,true);
    addHist("ITBI "+fmtNum(pct,2)+"% sobre "+fmtBRLCalc(val),fmtBRLCalc(imposto));
  };

  // Enter key support
  ["pPct1","pVal1","pPct2","pVal2","pValA","pValB","aValTotal","aHaTotal","aHaSim","aConvVal","itbiVal","itbiPct"].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.onkeydown=function(e){
      if(e.key==="Enter"){
        var map={"pPct1":"bCalcP1","pVal1":"bCalcP1","pPct2":"bCalcP2","pVal2":"bCalcP2","pValA":"bCalcP3","pValB":"bCalcP3","aValTotal":"bCalcHa","aHaTotal":"bCalcHa","aHaSim":"bCalcHaSim","aConvVal":"bCalcConv","itbiVal":"bCalcITBI","itbiPct":"bCalcITBI"};
        var btn=document.getElementById(map[id]);
        if(btn)btn.click();
      }
    };
  });
}

function bindMoneyInputs(root){
  root=root||document;
  root.querySelectorAll('input.money-input').forEach(function(inp){
    if(inp._moneyBound)return;
    inp._moneyBound=true;
    // If field has a pre-filled value, format it on bind
    if(inp.value&&inp.value.trim()){
      var preRaw=inp.value.replace(/\./g,'').replace(',','.');
      var preNum=parseFloat(preRaw);
      if(!isNaN(preNum)&&preNum>0){
        inp.value=preNum.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      }
    }
    inp.addEventListener('input',function(){
      var raw=inp.value.replace(/\D/g,'');
      if(!raw){inp.value='';return;}
      var num=parseInt(raw,10)/100;
      var fmt=num.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
      inp.value=fmt;
      try{inp.setSelectionRange(inp.value.length,inp.value.length);}catch(e){}
    });
    inp.addEventListener('focus',function(){
      if(!inp.value)inp.placeholder='0,00';
    });
    inp.addEventListener('blur',function(){
      if(inp.value==='0,00'||inp.value==='')inp.value='';
    });
    inp.addEventListener('keydown',function(e){
      // Allow: backspace, delete, tab, arrows, ctrl+a/c/v/x
      if([8,9,37,38,39,40,46].indexOf(e.keyCode)>=0)return;
      if((e.ctrlKey||e.metaKey)&&[65,67,86,88].indexOf(e.keyCode)>=0)return;
      // Allow digits only
      if(e.key&&!/^\d$/.test(e.key)&&e.key.length===1){
        e.preventDefault();
      }
    });
  });
}

function bindMinhaConta(){
  var u=A.user;
  if(!u)return;

  // Profile photo upload
  var photoInp=document.getElementById('mcPhotoInput');
  if(photoInp)photoInp.onchange=function(){
    var file=photoInp.files&&photoInp.files[0];
    if(!file)return;
    if(!file.type.match(/^image\//)){toast('Selecione um arquivo de imagem.','error');return;}
    var reader=new FileReader();
    reader.onload=function(ev){
      A.photoEditSrc=ev.target.result;
      A.photoEditZoom=1;
      A.modal='photoEdit';
      renderModal();
    };
    reader.readAsDataURL(file);
  };;

  // Remove photo
  var bRmPhoto=document.getElementById('bMCPhotoRemove');
  if(bRmPhoto)bRmPhoto.onclick=function(){
    if(!confirm('Remover sua foto de perfil?'))return;
    ssy(true);
    db.collection('users').doc(u.id).update({photo:firebase.firestore.FieldValue.delete()}).then(function(){
      ssy(false);delete u.photo;toast('Foto removida.');render();
    }).catch(function(e){
      // fallback if FieldValue not available
      db.collection('users').doc(u.id).update({photo:''}).then(function(){
        ssy(false);u.photo='';toast('Foto removida.');render();
      });
    });
  };

  // Theme toggle
  var bTh=document.getElementById('bMCTheme');
  if(bTh)bTh.onclick=function(){toggleTheme();};

  // Change password
  var bPwd=document.getElementById('bMCPwd');
  if(bPwd)bPwd.onclick=function(){
    var np=document.getElementById('mcNewPwd').value;

    var errEl=document.getElementById('mcPwdErr');
    if(!np||np.length<6){errEl.innerHTML='<div class="error-msg">Senha deve ter ao menos 6 caracteres.</div>';return;}
    if(np!==cp){errEl.innerHTML='<div class="error-msg">Senhas nao conferem.</div>';return;}

      ssy(false);bPwd.disabled=false;
      errEl.innerHTML='<div style="color:var(--green);font-size:13px"><i class="ti ti-check"></i> Senha alterada com sucesso!</div>';
      document.getElementById('mcNewPwd').value='';
      document.getElementById('mcConfPwd').value='';
    }).catch(function(e){
      ssy(false);bPwd.disabled=false;
      errEl.innerHTML='<div class="error-msg">'+e.message+'</div>';
    });
  };

  // Save name
  var bName=document.getElementById('bMCName');
  if(bName)bName.onclick=function(){
    var nm=document.getElementById('mcName').value.trim();
    var errEl2=document.getElementById('mcNameErr');
    if(!nm){errEl2.innerHTML='<div class="error-msg">Digite um nome.</div>';return;}

      u.name=nm;
      errEl2.innerHTML='<div style="color:var(--green);font-size:13px"><i class="ti ti-check"></i> Nome atualizado!</div>';
      render();
    }).catch(function(e){
      ssy(false);bName.disabled=false;

  };

    if(pCanvas){
      var pImg=new Image();
      var pState={offX:0,offY:0,zoom:parseFloat((A.photoEditZoom||1))};
      var pLoaded=false;
      pImg.onload=function(){
        pLoaded=true;
        // Center initial position
        var base=Math.max(240/pImg.width,240/pImg.height);
        pState.base=base;
        pState.offX=(240-pImg.width*base*pState.zoom)/2;
        pState.offY=(240-pImg.height*base*pState.zoom)/2;
        drawP();
      };
      pImg.src=A.photoEditSrc;
      function drawP(){
        if(!pLoaded)return;
        var ctx=pCanvas.getContext('2d');
        ctx.clearRect(0,0,240,240);
        var scale=pState.base*pState.zoom;
        ctx.drawImage(pImg,pState.offX,pState.offY,pImg.width*scale,pImg.height*scale);
      }
      if(pZoom)pZoom.oninput=function(){
        var newZoom=parseFloat(pZoom.value);
        if(pLoaded){
          var scale=pState.base*pState.zoom;
          var newScale=pState.base*newZoom;
          // Keep center point fixed
          var cx=120-pState.offX,cy=120-pState.offY;
          var ratio=newScale/scale;
          pState.offX=120-cx*ratio;
          pState.offY=120-cy*ratio;
        }
        pState.zoom=newZoom;
        A.photoEditZoom=newZoom;
        drawP();
      };
      // Drag to pan
      var dragging=false,lastX=0,lastY=0;
      function startDrag(x,y){dragging=true;lastX=x;lastY=y;}
      function moveDrag(x,y){
        if(!dragging)return;
        pState.offX+=(x-lastX);
        pState.offY+=(y-lastY);
        lastX=x;lastY=y;
        drawP();
      }
      function endDrag(){dragging=false;}
      if(pWrap){
        pWrap.onmousedown=function(e){startDrag(e.clientX,e.clientY);};
        window.addEventListener('mousemove',function(e){moveDrag(e.clientX,e.clientY);});
        window.addEventListener('mouseup',endDrag);
        pWrap.ontouchstart=function(e){var t=e.touches[0];startDrag(t.clientX,t.clientY);};
        pWrap.ontouchmove=function(e){var t=e.touches[0];moveDrag(t.clientX,t.clientY);e.preventDefault();};
        pWrap.ontouchend=endDrag;

    if(A.tab==="orcamento_proc")bindOrcamentoProc(A.sel);
  }
}

// INICIAR
function waitForFirebase(attempts){
  if(typeof firebase !== 'undefined'){
    startApp();
  } else if(attempts > 0){
    setTimeout(function(){waitForFirebase(attempts-1);}, 300);
  } else {
    var app=document.getElementById('app');
    if(app)app.innerHTML='<div class="loading-screen"><div style="color:#f87171;text-align:center">'
      +'<div style="font-size:18px;margin-bottom:8px">&#9888; Erro de conexao</div>'
      +'<div style="font-size:13px;color:#aaa">Nao foi possivel carregar o Firebase.<br>Verifique sua conexao e <a href="" style="color:#60a5fa">recarregue a pagina</a>.</div>'
      +'</div></div>';
  }
}
waitForFirebase(15);
</script>
