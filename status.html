<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acompanhamento — 1º Tabelionato Marabá</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}
.header{background:#1a3a5c;color:#fff;padding:1rem 1.25rem;}
.header h1{font-size:14px;font-weight:700;line-height:1.4;}
.header p{font-size:11px;opacity:.7;margin-top:3px;}
.container{max-width:600px;margin:1.25rem auto;padding:0 1rem 3rem;}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:1rem;overflow:hidden;}
.card-header{background:#1a3a5c;color:#fff;padding:.65rem 1rem;font-size:13px;font-weight:700;}
.card-body{padding:1rem;}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:.45rem 0;border-bottom:1px solid #f1f5f9;font-size:13px;gap:8px;}
.row:last-child{border-bottom:none;}
.lbl{color:#64748b;font-size:12px;min-width:110px;flex-shrink:0;}
.val{font-weight:600;text-align:right;word-break:break-word;}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;}
.steps-wrap{overflow-x:auto;padding-bottom:.5rem;}
.steps{display:flex;align-items:flex-start;position:relative;min-width:320px;}
.steps::before{content:'';position:absolute;top:15px;left:16px;right:16px;height:3px;background:#e2e8f0;z-index:0;}
.step{display:flex;flex-direction:column;align-items:center;gap:5px;flex:1;position:relative;z-index:1;}
.dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:3px solid #e2e8f0;background:#fff;}
.dot.done{background:#16a34a;border-color:#16a34a;color:#fff;}
.dot.current{background:#1a3a5c;border-color:#1a3a5c;color:#fff;box-shadow:0 0 0 4px rgba(26,58,92,.15);}
.dot.pend{color:#94a3b8;}
.slbl{font-size:9px;text-align:center;color:#64748b;line-height:1.2;max-width:56px;}
.slbl.current{color:#1a3a5c;font-weight:700;}
.msg{border-radius:8px;padding:.75rem 1rem;font-size:13px;margin-top:.75rem;line-height:1.5;}
.msg.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.msg.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.msg.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
.msg.err{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;}
.sec-title{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin:.75rem 0 .35rem;padding-bottom:.25rem;border-bottom:2px solid #f1f5f9;}
.ci{display:flex;align-items:center;gap:8px;padding:.35rem 0;font-size:13px;border-bottom:1px solid #f8fafc;}
.ci:last-child{border-bottom:none;}
.cico{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;}
.cico.ok{background:#dcfce7;color:#16a34a;}
.cico.nd{background:#fee2e2;color:#dc2626;}
.foot{text-align:center;font-size:11px;color:#94a3b8;margin-top:1rem;line-height:1.7;}
.center{text-align:center;padding:3rem 1rem;}
.center h2{font-size:17px;font-weight:700;margin-bottom:.5rem;}
.center p{color:#64748b;font-size:13px;line-height:1.6;}
</style>
</head>
<body>
<div class="header">
  <h1>1º Tabelionato de Notas e Registro de Imóveis de Marabá-PA</h1>
  <p>Acompanhamento de Protocolo</p>
</div>
<div class="container" id="app">
  <div class="center"><p>⏳ Carregando...</p></div>
</div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDTWQhhjKg5-aBagrNR3fJyfT_NkFELgr8",
  authDomain:"cartorio-maraba.firebaseapp.com",
  projectId:"cartorio-maraba"
});
var db=firebase.firestore();

var STS=[
  {key:"cadastrado",        label:"Cadastrado",          step:1,bg:"#e0e7ff",color:"#3730a3"},
  {key:"minutando",         label:"Minutando",            step:2,bg:"#fef9c3",color:"#854d0e"},
  {key:"para_conferir",     label:"Para Conferir",        step:2,bg:"#ffedd5",color:"#9a3412"},
  {key:"conferindo",        label:"Conferindo",           step:3,bg:"#dbeafe",color:"#1e40af"},
  {key:"aguard_assinatura", label:"Aguard. Assinatura",   step:4,bg:"#f3e8ff",color:"#6b21a8"},
  {key:"assinado",          label:"Assinado",             step:4,bg:"#dcfce7",color:"#166534"},
  {key:"registro",          label:"Em Registro",          step:5,bg:"#e0f2fe",color:"#0369a1"},
  {key:"concluido",         label:"Concluído",            step:5,bg:"#dcfce7",color:"#166534"},
];
var STEPS=[
  {key:"cadastrado",        label:"Cadastrado"},
  {key:"minutando",         label:"Minutando"},
  {key:"conferindo",        label:"Conferindo"},
  {key:"aguard_assinatura", label:"Aguard.\nAssin."},
  {key:"registro",          label:"Registrando"},
];
var MSGS={
  cadastrado:    {t:"Seu processo foi recebido e registrado. Em breve nossa equipe iniciará a preparação.",c:"info"},
  minutando:     {t:"Seu processo está sendo preparado pela nossa equipe. Em breve estará pronto para revisão.",c:"info"},
  para_conferir: {t:"A preparação foi concluída e seu processo aguarda revisão técnica.",c:"info"},
  conferindo:    {t:"Seu processo está passando por revisão técnica detalhada.",c:"info"},
  aguard_assinatura:{t:"✅ Seu processo está pronto para assinatura! Entre em contato com o cartório para agendar.",c:"ok"},
  assinado:      {t:"Seu processo foi assinado e está sendo encaminhado para registro.",c:"info"},
  registro:      {t:"⏳ Seu processo assinado está em fase de registro final.",c:"warn"},
  concluido:     {t:"🎉 Processo concluído! Entre em contato com o cartório para retirar seus documentos.",c:"ok"},
  cancelado:     {t:"❌ Este processo foi cancelado. Entre em contato com o cartório para mais informações.",c:"err"},
};

function gs(k){for(var i=0;i<STS.length;i++)if(STS[i].key===k)return STS[i];return STS[0];}
function ex(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fd(s){if(!s)return null;try{return new Date(s).toLocaleDateString("pt-BR");}catch(e){return s;}}
function fdt(s){if(!s)return null;try{return new Date(s).toLocaleString("pt-BR",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){return s;}}
function stepIdx(status){var s=gs(status);var n=s.step||1;return n<=1?0:n===2?1:n===3?2:n===4?3:4;}

function render(d){
  // d = token document data (already contains everything needed)
  var status=d.status||"cadastrado";
  var s=gs(status);
  var cur=stepIdx(status);
  var m=MSGS[status]||{t:"Seu processo está em andamento.",c:"info"};

  // Steps bar
  var stH='<div class="steps-wrap"><div class="steps">';
  for(var i=0;i<STEPS.length;i++){
    var done=i<cur,isCur=i===cur;
    stH+='<div class="step"><div class="dot '+(done?"done":isCur?"current":"pend")+'">'
      +(done?"✓":(i+1))+'</div>'
      +'<div class="slbl'+(isCur?" current":"")+'">'+STEPS[i].label+'</div></div>';
  }
  stH+='</div></div>';

  var h="";

  // Info card
  h+='<div class="card"><div class="card-header">📋 Protocolo '+ex(d.protocol||"")+'</div><div class="card-body">';
  h+='<div class="row"><span class="lbl">Natureza</span><span class="val">'+ex(d.natureza||"---")+'</span></div>';
  var tr=d.transmitentes||[];
  var ad=d.adquirentes||[];
  if(tr.length)h+='<div class="row"><span class="lbl">Transmitente(s)</span><span class="val">'+tr.map(ex).join("<br>")+'</span></div>';
  if(ad.length)h+='<div class="row"><span class="lbl">Adquirente(s)</span><span class="val">'+ad.map(ex).join("<br>")+'</span></div>';
  if(d.matriculas)h+='<div class="row"><span class="lbl">Matrícula(s)</span><span class="val">'+ex(d.matriculas)+'</span></div>';
  var dAs=fd(d.dataAssinatura);
  if(dAs)h+='<div class="row"><span class="lbl">Data de Assinatura</span><span class="val" style="color:#1a3a5c">📅 '+ex(dAs)+'</span></div>';
  h+='<div class="row"><span class="lbl">Status</span><span class="val"><span class="badge" style="background:'+s.bg+';color:'+s.color+'">'+s.label+'</span></span></div>';
  h+='</div></div>';

  // Progress card
  h+='<div class="card"><div class="card-header">📍 Caminho do Processo</div><div class="card-body">';
  h+=stH;
  h+='<div class="msg '+m.c+'">'+ex(m.t)+'</div>';
  h+='</div></div>';

  // Checklist card
  var pres=d.checklistPres||[];
  var pend=d.checklistPend||[];
  if(pres.length||pend.length){
    h+='<div class="card"><div class="card-header">📄 Documentos</div><div class="card-body">';
    if(pres.length){
      h+='<div class="sec-title">✅ Apresentados ('+pres.length+')</div>';
      pres.forEach(function(it){h+='<div class="ci"><div class="cico ok">✓</div><span>'+ex(it)+'</span></div>';});
    }
    if(pend.length){
      h+='<div class="sec-title" style="color:#dc2626">⏳ Pendentes ('+pend.length+')</div>';
      pend.forEach(function(it){h+='<div class="ci"><div class="cico nd">✗</div><span>'+ex(it)+'</span></div>';});
    }
    h+='</div></div>';
  }

  var upd=fdt(d.updatedAt);
  h+='<div class="foot">'+(upd?'Última atualização: '+ex(upd)+'<br>':'')
    +'1º Tabelionato de Notas e Registro de Imóveis de Marabá-PA</div>';

  document.getElementById("app").innerHTML=h;
}

// Get token and load ONLY from tokens/ collection
var token=(new URLSearchParams(window.location.search)).get("t");

if(!token){
  document.getElementById("app").innerHTML='<div class="center"><h2>❌ Link inválido</h2><p>Escaneie o QR Code na capa do seu processo.</p></div>';
} else {
  // Single read from tokens/ — no auth required
  db.collection("tokens").doc(token).get()
    .then(function(doc){
      if(!doc.exists){
        document.getElementById("app").innerHTML='<div class="center"><h2>❌ Link não encontrado</h2><p>Este link não é válido ou foi desativado.<br>Entre em contato com o cartório.</p></div>';
        return;
      }
      render(doc.data());
    })
    .catch(function(e){
      document.getElementById("app").innerHTML='<div class="center"><h2>❌ Erro</h2><p>'+ex(e.message)+'</p></div>';
    });
}
</script>
</body>
</html>
